<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gênesis 38 - Estudo Exegético</title>
    <style>
        /* =========================================
           ESTILOS (CSS) - Cores Branco e Azul
           ========================================= */
        :root {
            --azul-escuro: #003366;
            --azul-principal: #00509e;
            --azul-claro: #e6f2ff;
            --branco: #ffffff;
            --cinza-texto: #333333;
            --fundo-pagina: #f8fbfd;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--fundo-pagina);
            color: var(--cinza-texto);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            background-color: var(--azul-escuro);
            color: var(--branco);
            text-align: center;
            padding: 1.5rem;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        /* Barra de Controlo para a Tradução */
        .controls {
            background-color: var(--azul-claro);
            padding: 15px;
            text-align: center;
            border-bottom: 2px solid var(--azul-principal);
        }

        .controls label {
            font-weight: bold;
            color: var(--azul-escuro);
            margin-right: 10px;
        }

        .controls select {
            padding: 8px;
            border-radius: 5px;
            border: 1px solid var(--azul-principal);
            font-size: 1rem;
            color: var(--azul-escuro);
            background-color: var(--branco);
            cursor: pointer;
        }

        /* Área Central do Texto */
        main {
            flex: 1;
            padding: 2rem;
            max-width: 900px;
            margin: 0 auto;
            text-align: center;
        }

        .verse-container {
            margin-bottom: 2rem;
            padding: 1rem;
            background-color: var(--branco);
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            border-left: 5px solid var(--azul-principal);
        }

        .verse-number {
            font-weight: bold;
            color: var(--azul-principal);
            font-size: 1.2rem;
            display: block;
            margin-bottom: 1rem;
            text-align: left;
        }

        /* Container para alinhar as palavras hebraicas da direita para a esquerda (RTL) */
        .hebrew-text {
            display: flex;
            flex-wrap: wrap;
            flex-direction: row-reverse;
            justify-content: center;
            gap: 15px;
        }

        .word-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            padding: 10px;
            border-radius: 8px;
            transition: background-color 0.3s, transform 0.2s;
        }

        .word-box:hover {
            background-color: var(--azul-claro);
            transform: translateY(-2px);
        }

        .hebrew-word {
            font-size: 2.5rem;
            font-family: 'Times New Roman', Times, serif;
            color: var(--azul-escuro);
        }

        .transliteration {
            font-size: 0.9rem;
            color: #666;
            margin-top: 5px;
            font-style: italic;
        }

        /* Espaço onde a tradução vai aparecer */
        .translation-text {
            margin-top: 20px;
            padding: 15px;
            background-color: var(--fundo-pagina);
            border-left: 3px solid #ccc;
            text-align: justify;
            font-size: 1.1rem;
            line-height: 1.5;
            display: none; /* Escondido por padrão, aparece apenas se tiver texto */
        }

        /* Menu Lateral (Sidebar) */
        #sidebar {
            position: fixed;
            top: 0;
            right: -300px;
            width: 300px;
            height: 100%;
            background-color: var(--branco);
            box-shadow: -2px 0 5px rgba(0,0,0,0.1);
            transition: right 0.3s ease;
            display: flex;
            flex-direction: column;
            padding: 20px;
            box-sizing: border-box;
            z-index: 1000;
        }

        #sidebar.open {
            right: 0;
        }

        .sidebar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--azul-claro);
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 1.5rem;
            color: var(--azul-escuro);
            cursor: pointer;
        }

        .sidebar-btn {
            background-color: var(--azul-principal);
            color: var(--branco);
            border: none;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1rem;
            transition: background-color 0.3s;
        }

        .sidebar-btn:hover {
            background-color: var(--azul-escuro);
        }

        /* Caixa Pop-up (Modal) */
        #modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 51, 102, 0.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }

        #modal-content {
            background-color: var(--branco);
            padding: 30px;
            border-radius: 8px;
            max-width: 600px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            position: relative;
        }

        #modal-close {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--azul-escuro);
            background: none;
            border: none;
        }

        #modal-title {
            color: var(--azul-principal);
            margin-top: 0;
            border-bottom: 1px solid var(--azul-claro);
            padding-bottom: 10px;
        }
    </style>
</head>
<body>

    <header>
        <h1>Gênesis 38</h1>
        <p>Estudo Didático, Exegético e Teológico</p>
    </header>

    <div class="controls">
        <label for="seletor-versao">Tradução do Versículo:</label>
        <select id="seletor-versao" onchange="mudarTraducao(this.value)">
            <option value="">Ocultar Tradução</option>
            <option value="ACF">Almeida Corrigida Fiel (ACF)</option>
            <option value="NAA">Nova Almeida Atualizada (NAA)</option>
            <option value="ARA">Almeida Revista e Atualizada (ARA)</option>
            <option value="NVI (PT-BR)">Nova Versão Internacional (NVI)</option>
            <option value="NTLH">Nova Tradução na Linguagem de Hoje (NTLH)</option>
            <option value="KJA">King James Atualizada (KJA)</option>
            <option value="VULGATA">Vulgata (Latim)</option>
            <option value="LXX - Grego">Septuaginta (LXX - Grego)</option>
            <option value="ASV - English">American Standard Version (ASV)</option>
            <option value="NASB - English">New American Standard Bible (NASB)</option>
        </select>
    </div>

    <main id="text-container">
        <p>A carregar os dados...</p>
    </main>

    <aside id="sidebar">
        <div class="sidebar-header">
            <h2 id="sidebar-word-title">Palavra</h2>
            <button class="close-btn" onclick="fecharSidebar()">✖</button>
        </div>
        <p style="font-size: 0.9em; color: #666; margin-bottom: 20px;">Selecione uma área de estudo:</p>
        <button class="sidebar-btn" onclick="abrirModal('Morfossintaxe')">Morfossintaxe</button>
        <button class="sidebar-btn" onclick="abrirModal('Exegese')">Exegese</button>
        <button class="sidebar-btn" onclick="abrirModal('Teologia')">Teologia</button>
    </aside>

    <div id="modal-overlay" onclick="fecharModal(event)">
        <div id="modal-content">
            <button id="modal-close" onclick="fecharModal(event)">✖</button>
            <h2 id="modal-title">Título</h2>
            <div id="modal-body">
                Conteúdo aqui...
            </div>
        </div>
    </div>

    <script>
        let palavraAtualSelecionada = null;
        
        // Memória para guardar as traduções carregadas
        let dadosDasTraducoes = {};

        // Função principal que inicia o aplicativo
        async function carregarDados() {
            try {
                let todosOsVersiculos = []; // Lista mestre para guardar todos os versículos

                // 1. Tentar carregar a Parte 1 (Versos 1-10)
                const responseParte1 = await fetch('genesis38_1_10.json');
                if (responseParte1.ok) {
                    const dadosParte1 = await responseParte1.json();
                    todosOsVersiculos = todosOsVersiculos.concat(dadosParte1); // Junta à lista mestre
                } else {
                    console.warn("Ficheiro genesis38_1_10.json não encontrado.");
                }

                // 2. Tentar carregar a Parte 2 (Versos 11-20)
                const responseParte2 = await fetch('genesis38_11_20.json');
                if (responseParte2.ok) {
                    const dadosParte2 = await responseParte2.json();
                    todosOsVersiculos = todosOsVersiculos.concat(dadosParte2); // Junta à lista mestre
                } else {
                    console.warn("Ficheiro genesis38_11_20.json não encontrado.");
                }

                // 3. Tentar carregar a Parte 3 (Versos 21-30) - Preparado para o futuro!
                const responseParte3 = await fetch('genesis38_21_30.json');
                if (responseParte3.ok) {
                    const dadosParte3 = await responseParte3.json();
                    todosOsVersiculos = todosOsVersiculos.concat(dadosParte3); // Junta à lista mestre
                } else {
                    console.info("Ficheiro genesis38_21_30.json ainda não está disponível (normal).");
                }

                // Se a lista continuar vazia, significa que não carregou nenhum ficheiro
                if (todosOsVersiculos.length === 0) {
                    throw new Error("Não foi possível carregar nenhum ficheiro de versículos.");
                }

                // 4. Carregar as Traduções
                const responseTraducoes = await fetch('genesis38_traducoes.json');
                if (responseTraducoes.ok) {
                    dadosDasTraducoes = await responseTraducoes.json();
                } else {
                    console.warn("Ficheiro genesis38_traducoes.json não encontrado. Traduções não estarão disponíveis.");
                }

                // 5. Desenhar a interface com todos os versículos reunidos
                renderizarVersiculos(todosOsVersiculos);

            } catch (error) {
                document.getElementById('text-container').innerHTML = `
                    <div style="color: red; padding: 20px;">
                        <strong>Aviso:</strong> ${error.message} <br><br>
                        <em>Certifique-se de que está a correr os ficheiros num servidor local se o navegador bloquear o acesso aos JSONs.</em>
                    </div>`;
            }
        }

        // Função para desenhar o texto na tela
        function renderizarVersiculos(versiculos) {
            const container = document.getElementById('text-container');
            container.innerHTML = ''; 

            versiculos.forEach(verso => {
                const divVerso = document.createElement('div');
                divVerso.className = 'verse-container';
                // Adicionamos um identificador (ID) à caixa para saber que versículo é
                divVerso.id = `caixa-verso-${verso.numero}`;

                const numVerso = document.createElement('span');
                numVerso.className = 'verse-number';
                numVerso.textContent = `Gênesis 38:${verso.numero}`;
                divVerso.appendChild(numVerso);

                const divPalavras = document.createElement('div');
                divPalavras.className = 'hebrew-text';

                verso.palavras.forEach(palavra => {
                    const divPalavra = document.createElement('div');
                    divPalavra.className = 'word-box';
                    divPalavra.onclick = () => abrirSidebar(palavra);

                    const spanHebraico = document.createElement('span');
                    spanHebraico.className = 'hebrew-word';
                    spanHebraico.textContent = palavra.hebraico;

                    const spanTransliteracao = document.createElement('span');
                    spanTransliteracao.className = 'transliteration';
                    spanTransliteracao.textContent = palavra.transliteracao;

                    divPalavra.appendChild(spanHebraico);
                    divPalavra.appendChild(spanTransliteracao);
                    divPalavras.appendChild(divPalavra);
                });

                divVerso.appendChild(divPalavras);

                // A "Gaveta" da Tradução!
                const pTraducao = document.createElement('p');
                pTraducao.id = `traducao-verso-${verso.numero}`;
                pTraducao.className = 'translation-text';
                divVerso.appendChild(pTraducao);

                container.appendChild(divVerso);
            });
        }

        // Função que preenche as traduções de forma inteligente
        function mudarTraducao(versaoEscolhida) {
            // Pegamos em todas as caixas de versículos que existem no ecrã
            const caixas = document.querySelectorAll('.verse-container');

            caixas.forEach(caixa => {
                // O ID da caixa é "caixa-verso-X". Vamos extrair o "X" (o número do versículo)
                const numeroVerso = caixa.id.split('-')[2]; 
                let gaveta = document.getElementById(`traducao-verso-${numeroVerso}`);
                
                if (gaveta) {
                    // Se escolheu uma versão válida e essa versão tem o versículo específico...
                    if (versaoEscolhida && dadosDasTraducoes[versaoEscolhida] && dadosDasTraducoes[versaoEscolhida][numeroVerso]) {
                        // Coloca o texto lá e torna visível
                        gaveta.innerText = dadosDasTraducoes[versaoEscolhida][numeroVerso];
                        gaveta.style.display = 'block';
                    } else {
                        // Se escolheu "Ocultar", deu algum erro ou a tradução não existe, limpa e esconde
                        gaveta.innerText = '';
                        gaveta.style.display = 'none';
                    }
                }
            });
        }

        // Funções da Sidebar e Modal
        function abrirSidebar(dadosDaPalavra) {
            palavraAtualSelecionada = dadosDaPalavra; 
            document.getElementById('sidebar-word-title').textContent = dadosDaPalavra.hebraico;
            document.getElementById('sidebar').classList.add('open');
        }

        function fecharSidebar() {
            document.getElementById('sidebar').classList.remove('open');
        }

        function abrirModal(tipo) {
            if (!palavraAtualSelecionada) return;
            const tituloModal = document.getElementById('modal-title');
            const corpoModal = document.getElementById('modal-body');

            tituloModal.textContent = tipo + " - " + palavraAtualSelecionada.hebraico;

            if (tipo === 'Morfossintaxe') {
                corpoModal.innerHTML = formatarTexto(palavraAtualSelecionada.morfossintaxe);
            } else if (tipo === 'Exegese') {
                corpoModal.innerHTML = formatarTexto(palavraAtualSelecionada.exegese);
            } else if (tipo === 'Teologia') {
                corpoModal.innerHTML = formatarTexto(palavraAtualSelecionada.teologia);
            }
            document.getElementById('modal-overlay').style.display = 'flex';
        }

        function fecharModal(event) {
            if (event.target.id === 'modal-overlay' || event.target.id === 'modal-close') {
                document.getElementById('modal-overlay').style.display = 'none';
            }
        }

        function formatarTexto(texto) {
            if (!texto) return "<p>Informação não disponível.</p>";
            return "<p>" + texto.replace(/\n/g, "<br>") + "</p>";
        }

        // Inicia o programa
        window.onload = carregarDados;
    </script>
</body>
</html>
