<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gênesis 38 - Estudo Exegético</title>
    <style>
        /* =========================================
           ESTILOS (CSS) - Cores Branco e Azul
           ========================================= */
        :root {
            --azul-escuro: #003366;
            --azul-principal: #00509e;
            --azul-claro: #e6f2ff;
            --branco: #ffffff;
            --cinza-texto: #333333;
            --fundo-pagina: #f8fbfd;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--fundo-pagina);
            color: var(--cinza-texto);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            background-color: var(--azul-escuro);
            color: var(--branco);
            text-align: center;
            padding: 1.5rem;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        /* Área Central do Texto */
        main {
            flex: 1;
            padding: 2rem;
            max-width: 900px;
            margin: 0 auto;
            text-align: center;
        }

        .verse-container {
            margin-bottom: 2rem;
            padding: 1rem;
            background-color: var(--branco);
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            border-left: 5px solid var(--azul-principal);
        }

        .verse-number {
            font-weight: bold;
            color: var(--azul-principal);
            font-size: 1.2rem;
            display: block;
            margin-bottom: 1rem;
            text-align: left;
        }

        /* Container para alinhar as palavras hebraicas da direita para a esquerda (RTL) */
        .hebrew-text {
            display: flex;
            flex-wrap: wrap;
            flex-direction: row-reverse; /* Hebraico lê-se da direita para a esquerda */
            justify-content: center;
            gap: 15px;
        }

        .word-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            padding: 10px;
            border-radius: 8px;
            transition: background-color 0.3s, transform 0.2s;
        }

        .word-box:hover {
            background-color: var(--azul-claro);
            transform: translateY(-2px);
        }

        .hebrew-word {
            font-size: 2.5rem;
            font-family: 'Times New Roman', Times, serif;
            color: var(--azul-escuro);
        }

        .transliteration {
            font-size: 0.9rem;
            color: #666;
            margin-top: 5px;
            font-style: italic;
        }

        /* Menu Lateral (Sidebar) */
        #sidebar {
            position: fixed;
            top: 0;
            right: -300px; /* Escondido por padrão */
            width: 300px;
            height: 100%;
            background-color: var(--branco);
            box-shadow: -2px 0 5px rgba(0,0,0,0.1);
            transition: right 0.3s ease;
            display: flex;
            flex-direction: column;
            padding: 20px;
            box-sizing: border-box;
            z-index: 1000;
        }

        #sidebar.open {
            right: 0;
        }

        .sidebar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--azul-claro);
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 1.5rem;
            color: var(--azul-escuro);
            cursor: pointer;
        }

        .sidebar-btn {
            background-color: var(--azul-principal);
            color: var(--branco);
            border: none;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1rem;
            transition: background-color 0.3s;
        }

        .sidebar-btn:hover {
            background-color: var(--azul-escuro);
        }

        /* Caixa Pop-up (Modal) */
        #modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 51, 102, 0.5); /* Fundo escuro azulado */
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }

        #modal-content {
            background-color: var(--branco);
            padding: 30px;
            border-radius: 8px;
            max-width: 600px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            position: relative;
        }

        #modal-close {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--azul-escuro);
            background: none;
            border: none;
        }

        #modal-title {
            color: var(--azul-principal);
            margin-top: 0;
            border-bottom: 1px solid var(--azul-claro);
            padding-bottom: 10px;
        }
    </style>
</head>
<body>

    <header>
        <h1>Gênesis 38</h1>
        <p>Estudo Didático, Exegético e Teológico</p>
    </header>

    <main id="text-container">
        <p>Carregando os dados...</p>
    </main>

    <aside id="sidebar">
        <div class="sidebar-header">
            <h2 id="sidebar-word-title">Palavra</h2>
            <button class="close-btn" onclick="fecharSidebar()">✖</button>
        </div>
        <p style="font-size: 0.9em; color: #666; margin-bottom: 20px;">Selecione uma área de estudo:</p>
        <button class="sidebar-btn" onclick="abrirModal('Morfossintaxe')">Morfossintaxe</button>
        <button class="sidebar-btn" onclick="abrirModal('Exegese')">Exegese</button>
        <button class="sidebar-btn" onclick="abrirModal('Teologia')">Teologia</button>
    </aside>

    <div id="modal-overlay" onclick="fecharModal(event)">
        <div id="modal-content">
            <button id="modal-close" onclick="fecharModal(event)">✖</button>
            <h2 id="modal-title">Título</h2>
            <div id="modal-body">
                Conteúdo aqui...
            </div>
        </div>
    </div>

    <script>
        // Variável para guardar a palavra que o usuário clicou atualmente
        let palavraAtualSelecionada = null;

        // Função principal que inicia o aplicativo
        async function carregarDados() {
            try {
                // Aqui estamos preparando para carregar o arquivo JSON que faremos a seguir.
                // Como ainda não temos o arquivo, vou deixar a estrutura pronta.
                const response = await fetch('genesis38_1_10.json');
                
                if (!response.ok) {
                    throw new Error("Arquivo JSON não encontrado. (Certifique-se de criar o arquivo no próximo passo!)");
                }

                const versiculos = await response.json();
                renderizarVersiculos(versiculos);

            } catch (error) {
                document.getElementById('text-container').innerHTML = `
                    <div style="color: red; padding: 20px;">
                        <strong>Aviso:</strong> ${error.message} <br><br>
                        <em>Quando criarmos e salvarmos o arquivo <b>genesis38_1_10.json</b> na mesma pasta, o texto aparecerá aqui.</em>
                    </div>`;
            }
        }

        // Função para desenhar o texto na tela
        function renderizarVersiculos(versiculos) {
            const container = document.getElementById('text-container');
            container.innerHTML = ''; // Limpa o "Carregando..."

            versiculos.forEach(verso => {
                // Cria a caixa do versículo
                const divVerso = document.createElement('div');
                divVerso.className = 'verse-container';

                // Adiciona o número do versículo
                const numVerso = document.createElement('span');
                numVerso.className = 'verse-number';
                numVerso.textContent = `Gênesis 38:${verso.numero}`;
                divVerso.appendChild(numVerso);

                // Container para as palavras (da direita para a esquerda)
                const divPalavras = document.createElement('div');
                divPalavras.className = 'hebrew-text';

                // Passa por cada palavra do JSON e cria o HTML dela
                verso.palavras.forEach(palavra => {
                    const divPalavra = document.createElement('div');
                    divPalavra.className = 'word-box';
                    
                    // Quando clicar na palavra, abre o menu lateral passando os dados dela
                    divPalavra.onclick = () => abrirSidebar(palavra);

                    // Cria o texto em hebraico
                    const spanHebraico = document.createElement('span');
                    spanHebraico.className = 'hebrew-word';
                    spanHebraico.textContent = palavra.hebraico;

                    // Cria a transliteração em português
                    const spanTransliteracao = document.createElement('span');
                    spanTransliteracao.className = 'transliteration';
                    spanTransliteracao.textContent = palavra.transliteracao;

                    // Junta tudo
                    divPalavra.appendChild(spanHebraico);
                    divPalavra.appendChild(spanTransliteracao);
                    divPalavras.appendChild(divPalavra);
                });

                divVerso.appendChild(divPalavras);
                container.appendChild(divVerso);
            });
        }

        // Abre o menu lateral com as informações da palavra clicada
        function abrirSidebar(dadosDaPalavra) {
            palavraAtualSelecionada = dadosDaPalavra; // Salva na memória
            document.getElementById('sidebar-word-title').textContent = dadosDaPalavra.hebraico;
            document.getElementById('sidebar').classList.add('open');
        }

        // Fecha o menu lateral
        function fecharSidebar() {
            document.getElementById('sidebar').classList.remove('open');
        }

        // Abre a caixa de pop-up (Modal) de acordo com o botão clicado
        function abrirModal(tipo) {
            if (!palavraAtualSelecionada) return;

            const tituloModal = document.getElementById('modal-title');
            const corpoModal = document.getElementById('modal-body');

            // Define o título e o conteúdo com base no que foi clicado
            tituloModal.textContent = tipo + " - " + palavraAtualSelecionada.hebraico;

            if (tipo === 'Morfossintaxe') {
                corpoModal.innerHTML = formatarTexto(palavraAtualSelecionada.morfossintaxe);
            } else if (tipo === 'Exegese') {
                corpoModal.innerHTML = formatarTexto(palavraAtualSelecionada.exegese);
            } else if (tipo === 'Teologia') {
                corpoModal.innerHTML = formatarTexto(palavraAtualSelecionada.teologia);
            }

            // Mostra o modal na tela
            document.getElementById('modal-overlay').style.display = 'flex';
        }

        // Fecha a caixa de pop-up
        function fecharModal(event) {
            // Só fecha se clicou no botão "X" ou fora da caixa branca
            if (event.target.id === 'modal-overlay' || event.target.id === 'modal-close') {
                document.getElementById('modal-overlay').style.display = 'none';
            }
        }

        // Função simples para transformar quebras de linha em <br> para HTML
        function formatarTexto(texto) {
            if (!texto) return "<p>Informação não disponível.</p>";
            // Substitui quebras de linha normais por tags parágrafo
            return "<p>" + texto.replace(/\n/g, "<br>") + "</p>";
        }

        // Inicia o programa assim que a página terminar de carregar
        window.onload = carregarDados;
    </script>
</body>
</html>
