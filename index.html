<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gênesis 38 - Análise Exegética Interativa</title>
    <style>
        /* --- 1. VARIÁVEIS E ESTILOS GERAIS (UI MODERNA) --- */
        :root {
            --cor-fundo: #f4f7f6;
            --cor-texto: #333;
            --cor-primaria: #2c3e50;
            --cor-destaque: #3498db;
            --cor-hebraico: #8e44ad;
            --cor-hover: #e8f4fd;
            --sombra: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        body {
            font-family: 'Inter', 'Segoe UI', sans-serif;
            background-color: var(--cor-fundo);
            color: var(--cor-texto);
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        header { text-align: center; margin-bottom: 50px; }
        h1 { color: var(--cor-primaria); margin-bottom: 5px; }
        .hebraico-titulo { font-size: 2.5em; color: var(--cor-hebraico); direction: rtl; }

        /* --- 2. ÁREA DOS VERSÍCULOS --- */
        .versiculo-card {
            background: white;
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 30px;
            box-shadow: var(--sombra);
            border-left: 5px solid var(--cor-destaque);
        }

        .versiculo-numero {
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #7f8c8d;
            margin-bottom: 15px;
            font-weight: bold;
        }

        /* Container do texto Hebraico (Direita para Esquerda) */
        .texto-hebraico-container {
            direction: rtl;
            text-align: right;
            font-size: 2.2em;
            line-height: 2;
            margin-bottom: 20px;
            font-family: 'SBL Hebrew', 'Ezra SIL', serif; /* Fontes boas para Hebraico */
        }

        /* Estilo para cada palavra clicável */
        .palavra-clicavel {
            display: inline-block;
            padding: 0 5px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
            color: var(--cor-primaria);
        }

        .palavra-clicavel:hover {
            background-color: var(--cor-hover);
            color: var(--cor-destaque);
            transform: scale(1.05);
        }

        .traducoes {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            font-size: 0.95em;
            color: #555;
        }

        /* --- 3. MENU LATERAL (SIDEBAR) --- */
        #sidebar {
            position: fixed;
            top: 0;
            right: -350px; /* Escondido fora da tela */
            width: 320px;
            height: 100vh;
            background: white;
            box-shadow: -5px 0 15px rgba(0,0,0,0.1);
            transition: right 0.3s ease-in-out;
            padding: 30px 20px;
            box-sizing: border-box;
            z-index: 100;
            display: flex;
            flex-direction: column;
        }

        #sidebar.aberto { right: 0; /* Desliza para dentro da tela */ }

        #sidebar h2 {
            color: var(--cor-hebraico);
            margin-top: 0;
            direction: rtl;
            font-size: 2em;
            text-align: center;
        }
        
        #sidebar p.transliteracao { text-align: center; color: #7f8c8d; font-style: italic; margin-bottom: 30px; }

        .btn-opcao {
            background: white;
            border: 2px solid var(--cor-destaque);
            color: var(--cor-destaque);
            padding: 12px 15px;
            margin-bottom: 15px;
            border-radius: 8px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            text-align: left;
        }

        .btn-opcao:hover { background: var(--cor-destaque); color: white; }
        .btn-fechar-sidebar { background: none; border: none; color: #e74c3c; font-size: 1em; cursor: pointer; margin-top: auto; font-weight: bold; text-align: center; padding: 10px;}

        /* --- 4. MODAL (POP-UP) --- */
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            display: none; /* Escondido por padrão */
            z-index: 200;
            opacity: 0; transition: opacity 0.3s ease;
        }

        #modal {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            background: white;
            padding: 30px;
            border-radius: 12px;
            width: 90%; max-width: 500px;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.2);
            display: none; /* Escondido por padrão */
            z-index: 201;
            opacity: 0; transition: all 0.3s ease;
        }

        #overlay.ativo, #modal.ativo { display: block; opacity: 1; transform: translate(-50%, -50%) scale(1); }
        
        #modal h3 { color: var(--cor-primaria); margin-top: 0; border-bottom: 2px solid var(--cor-hover); padding-bottom: 10px; }
        .btn-fechar-modal { float: right; background: #e74c3c; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; }

    </style>
</head>
<body>

    <div class="container">
        <header id="cabecalho"><h2>A carregar dados...</h2></header>
        <main id="conteudo-versiculos"></main>
    </div>

    <aside id="sidebar">
        <h2 id="sidebar-palavra-hebraica"></h2>
        <p id="sidebar-transliteracao" class="transliteracao"></p>
        
        <button class="btn-opcao" onclick="abrirModal('Morfossintaxe', palavraSelecionada.morfossintaxe)">Morfossintaxe</button>
        <button class="btn-opcao" onclick="abrirModal('Raiz / Campo', palavraSelecionada.raiz_campo)">Raiz e Campo Semântico</button>
        <button class="btn-opcao" onclick="abrirModal('Exegese e Teologia', palavraSelecionada.exegese)">Análise Exegética</button>
        
        <button class="btn-fechar-sidebar" onclick="fecharSidebar()">✖ Fechar Menu</button>
    </aside>

    <div id="overlay" onclick="fecharModal()"></div>
    <div id="modal">
        <button class="btn-fechar-modal" onclick="fecharModal()">Fechar</button>
        <h3 id="modal-titulo">Título</h3>
        <p id="modal-conteudo">Conteúdo detalhado aqui...</p>
    </div>

    <script>
        /* --- LÓGICA DE PROGRAMAÇÃO (JAVASCRIPT) --- */
        
        // Esta variável vai guardar os dados da palavra que o utilizador clicar
        let palavraSelecionada = null;

        // Lista de ficheiros que o programa vai tentar ler (preparado para os 3 ficheiros)
const ficheirosJSON = ['genesis38.json'];
        async function carregarDados() {
            let todosOsVersiculos = [];
            let informacoesCabecalho = null;

            // Tenta carregar cada ficheiro da lista
            for (const ficheiro of ficheirosJSON) {
                try {
                    const resposta = await fetch(ficheiro);
                    if (resposta.ok) {
                        const dados = await resposta.json();
                        // Guarda o cabeçalho do primeiro ficheiro que carregar com sucesso
                        if (!informacoesCabecalho) informacoesCabecalho = dados;
                        
                        // Junta os versículos deste ficheiro à lista principal
                        todosOsVersiculos = todosOsVersiculos.concat(dados.versiculos);
                    }
                } catch (erro) {
                    console.warn(`Ficheiro ${ficheiro} ainda não disponível ou erro ao carregar. Ignorando...`);
                }
            }

            if (todosOsVersiculos.length > 0) {
                mostrarCabecalho(informacoesCabecalho);
                mostrarVersiculos(todosOsVersiculos);
            } else {
                document.getElementById('cabecalho').innerHTML = "<h1>Erro. Nenhum ficheiro JSON foi encontrado.</h1>";
            }
        }

        function mostrarCabecalho(dados) {
            document.getElementById('cabecalho').innerHTML = `
                <h1>${dados.titulo}</h1>
                <div class="hebraico-titulo">${dados.hebraico_titulo}</div>
                <p><em>${dados.subtitulo}</em></p>
            `;
        }

        function mostrarVersiculos(versiculos) {
            const container = document.getElementById('conteudo-versiculos');
            let html = '';

            versiculos.forEach(versiculo => {
                // Monta o texto hebraico palavra a palavra (para serem clicáveis)
                let textoHebraicoHtml = '';
                
                // Verifica se existem palavras detalhadas no JSON
                if (versiculo.palavras && versiculo.palavras.length > 0) {
                    versiculo.palavras.forEach((palavra) => {
                        // Transformamos o objeto (palavra) numa string segura (JSON) para passar para a função do clique
                        const palavraJSON = encodeURIComponent(JSON.stringify(palavra));
                        textoHebraicoHtml += `<span class="palavra-clicavel" onclick="clicouNaPalavra('${palavraJSON}')">${palavra.hebraico}</span> `;
                    });
                } else {
                    // Se o versículo não tiver palavras detalhadas (ex: versos vazios no teu JSON), mostra texto normal
                    textoHebraicoHtml = `<span>${versiculo.texto_hebraico}</span>`;
                }

                // Prepara as traduções
                let traducoesHtml = '';
                if (versiculo.traducoes && versiculo.traducoes.ARA) {
                    traducoesHtml = `
                        <div class="traducoes">
                            <strong>ARA:</strong> ${versiculo.traducoes.ARA}
                        </div>
                    `;
                }

                html += `
                    <div class="versiculo-card">
                        <div class="versiculo-numero">Versículo ${versiculo.numero}</div>
                        <div class="texto-hebraico-container">
                            ${textoHebraicoHtml}
                        </div>
                        ${traducoesHtml}
                    </div>
                `;
            });

            container.innerHTML = html;
        }

        // --- FUNÇÕES DE INTERATIVIDADE ---

        // Executada quando se clica numa palavra em hebraico
        function clicouNaPalavra(palavraJSONCofificada) {
            // Descodifica o texto e transforma de volta num objeto JavaScript
            palavraSelecionada = JSON.parse(decodeURIComponent(palavraJSONCofificada));
            
            // Atualiza os textos do Menu Lateral
            document.getElementById('sidebar-palavra-hebraica').innerText = palavraSelecionada.hebraico;
            document.getElementById('sidebar-transliteracao').innerText = palavraSelecionada.transliteracao || '';
            
            // Abre o Menu Lateral
            document.getElementById('sidebar').classList.add('aberto');
        }

        function fecharSidebar() {
            document.getElementById('sidebar').classList.remove('aberto');
        }

        // Abre a Janela Pop-up com o detalhe escolhido (Morfossintaxe, Raiz ou Exegese)
        function abrirModal(titulo, conteudo) {
            // Se a palavra não tiver essa informação, mostra aviso
            if (!conteudo) {
                conteudo = "Informação não disponível para esta palavra.";
            }

            // Substitui \n (quebras de linha do JSON) por <br> no HTML para manter a formatação
            const conteudoFormatado = conteudo.replace(/\n/g, '<br>');

            document.getElementById('modal-titulo').innerText = titulo;
            document.getElementById('modal-conteudo').innerHTML = conteudoFormatado;
            
            document.getElementById('overlay').classList.add('ativo');
            document.getElementById('modal').classList.add('ativo');
        }

        function fecharModal() {
            document.getElementById('overlay').classList.remove('ativo');
            document.getElementById('modal').classList.remove('ativo');
        }

        // Inicia o programa
        carregarDados();
    </script>
</body>
</html>
