<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gênesis 38 — Análise Exegética</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@300;400;700&family=Inter:wght@300;400;500;600;700&family=Noto+Serif+Hebrew:wght@300;400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0e1117; --bg2: #161b22; --bg3: #1c2333; --bg4: #21262d;
  --border: #30363d; --accent: #c9a45a; --accent2: #8b5e3c;
  --text: #e6edf3; --text2: #8b949e; --text3: #6e7681;
  --heb: #f0c060; --trans: #79c0ff; --gram: #7ee787;
  --raiz: #d2a8ff; --exeg: #e6edf3; --rad: 10px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column}
header{background:var(--bg2);border-bottom:1px solid var(--border);padding:16px 24px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:100}
.logo-heb{font-family:'Frank Ruhl Libre',serif;font-size:2rem;color:var(--accent);direction:rtl}
.logo-pt{display:flex;flex-direction:column}
.logo-pt .title{font-size:1.1rem;font-weight:700;color:var(--text)}
.logo-pt .sub{font-size:.75rem;color:var(--text2)}
.theme-btn{margin-left:auto;background:var(--bg4);border:1px solid var(--border);color:var(--text2);padding:6px 14px;border-radius:20px;cursor:pointer;font-size:.8rem;transition:.2s}
.theme-btn:hover{color:var(--accent);border-color:var(--accent)}
.app{display:flex;flex:1;height:calc(100vh - 60px);overflow:hidden}

/* SIDEBAR */
.sidebar{width:220px;min-width:180px;background:var(--bg2);border-right:1px solid var(--border);overflow-y:auto;padding:12px 0}
.sidebar-title{font-size:.7rem;font-weight:600;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;padding:8px 16px}
.verse-btn{display:flex;align-items:center;gap:8px;width:100%;padding:8px 16px;background:none;border:none;color:var(--text2);cursor:pointer;font-size:.85rem;text-align:left;transition:.15s;border-left:3px solid transparent}
.verse-btn:hover{background:var(--bg3);color:var(--text)}
.verse-btn.active{background:var(--bg3);color:var(--accent);border-left-color:var(--accent)}
.verse-num{font-weight:600;min-width:22px;color:var(--accent);font-size:.9rem}
.verse-preview{font-family:'Noto Serif Hebrew',serif;direction:rtl;font-size:.8rem;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;max-width:130px;opacity:.7}
.has-analysis::after{content:'✦';font-size:.55rem;color:var(--gram);margin-left:auto}

/* MAIN */
.main{flex:1;overflow-y:auto;padding:24px}
.verse-card{max-width:920px;margin:0 auto}
.verse-header{display:flex;align-items:baseline;gap:12px;margin-bottom:20px}
.verse-header .vnum{font-size:2.5rem;font-weight:300;color:var(--accent);line-height:1}
.verse-header .vlabel{font-size:.75rem;color:var(--text3);text-transform:uppercase;letter-spacing:.1em}
.hebrew-text{font-family:'Noto Serif Hebrew','Frank Ruhl Libre',serif;font-size:1.5rem;direction:rtl;text-align:right;background:var(--bg2);border:1px solid var(--border);border-radius:var(--rad);padding:20px 24px;line-height:2;color:var(--heb);margin-bottom:20px;border-left:4px solid var(--accent)}
.tabs{display:flex;gap:2px;margin-bottom:16px;background:var(--bg2);border-radius:var(--rad);padding:4px;border:1px solid var(--border)}
.tab{flex:1;padding:8px;background:none;border:none;color:var(--text2);cursor:pointer;border-radius:7px;font-size:.82rem;font-weight:500;transition:.15s}
.tab:hover{background:var(--bg3);color:var(--text)}
.tab.active{background:var(--bg4);color:var(--accent);box-shadow:0 1px 4px rgba(0,0,0,.4)}
.tab-content{display:none}
.tab-content.active{display:block}

/* WORD ANALYSIS */
.words-grid{display:flex;flex-direction:column;gap:8px}
.word-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rad);overflow:hidden;transition:.2s}
.word-card:hover{border-color:var(--accent2)}
.word-header{display:grid;grid-template-columns:auto 1fr 1fr;gap:12px;align-items:center;padding:12px 16px;cursor:pointer;user-select:none}
.word-heb{font-family:'Noto Serif Hebrew','Frank Ruhl Libre',serif;font-size:1.6rem;direction:rtl;color:var(--heb);min-width:80px;text-align:right}
.word-translit{font-style:italic;color:var(--trans);font-size:.85rem}
.word-sem{color:var(--raiz);font-size:.8rem;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.word-expand-icon{margin-left:auto;color:var(--text3);font-size:.7rem;transition:.2s}
.word-card.open .word-expand-icon{transform:rotate(180deg);color:var(--accent)}
.word-body{display:none;border-top:1px solid var(--border)}
.word-card.open .word-body{display:block}
.word-detail{display:grid;grid-template-columns:1fr 1fr;gap:0;border-bottom:1px solid var(--border)}
.word-detail:last-child{border-bottom:none}
.detail-label{font-size:.65rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;padding:8px 12px 4px;color:var(--text3)}
.detail-val{padding:4px 12px 12px;font-size:.82rem;line-height:1.5;color:var(--text)}
.exeg-full{grid-column:1/-1}
.badge{display:inline-block;background:rgba(201,164,90,.12);border:1px solid rgba(201,164,90,.3);color:var(--accent);border-radius:4px;padding:1px 7px;font-size:.7rem;font-weight:600;margin-bottom:4px}

/* TRANSLATIONS */
.trans-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}
.trans-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rad);padding:14px}
.trans-version{font-size:.65rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--trans);margin-bottom:6px}
.trans-text{font-size:.88rem;line-height:1.6;color:var(--text)}
.trans-text.lxx{font-family:'Noto Serif Hebrew',serif;direction:ltr}
.no-analysis{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rad);padding:24px;text-align:center;color:var(--text2)}
.no-analysis .icon{font-size:2rem;margin-bottom:8px}

/* Nav buttons */
.nav-bar{display:flex;justify-content:space-between;align-items:center;margin-top:24px;padding-top:16px;border-top:1px solid var(--border)}
.nav-btn{background:var(--bg2);border:1px solid var(--border);color:var(--text2);padding:8px 18px;border-radius:var(--rad);cursor:pointer;font-size:.83rem;transition:.15s;display:flex;align-items:center;gap:6px}
.nav-btn:hover{border-color:var(--accent);color:var(--accent)}
.nav-btn:disabled{opacity:.3;cursor:not-allowed}
.verse-counter{color:var(--text3);font-size:.8rem}

/* Search */
.search-box{padding:8px 12px;width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--rad);color:var(--text);font-size:.82rem;margin-bottom:8px}
.search-box::placeholder{color:var(--text3)}
.search-box:focus{outline:none;border-color:var(--accent)}

/* scrollbar */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* light mode */
body.light{--bg:#f6f8fa;--bg2:#ffffff;--bg3:#f0f2f4;--bg4:#e8eaec;--border:#d0d7de;--text:#1f2328;--text2:#57606a;--text3:#8c959f;--heb:#7a4a00;--accent:#8b5e3c}

@media(max-width:640px){.sidebar{display:none}.trans-grid{grid-template-columns:1fr}.word-detail{grid-template-columns:1fr}}
</style>
</head>
<body>
<header>
  <div class="logo-heb">בראשית</div>
  <div class="logo-pt">
    <div class="title">Gênesis 38</div>
    <div class="sub">Análise Exegética Profunda</div>
  </div>
  <button class="theme-btn" onclick="toggleTheme()">☀ Modo Claro</button>
</header>
<div class="app">
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-title">Versículos</div>
    <input class="search-box" type="text" placeholder="🔍 Buscar..." oninput="filterVerses(this.value)" style="margin:0 12px 8px;width:calc(100% - 24px)">
    <div id="verse-list"></div>
  </nav>
  <main class="main" id="main-content"></main>
</div>

<script>
const DATA = {"titulo": "Gênesis 38 — Análise Exegética Profunda", "hebraico_titulo": "בְּרֵאשִׁית 38", "subtitulo": "Análise Morfossintática, Exegética e Teológica", "versiculos": [{"numero": 1, "texto_hebraico": "וַֽיְהִי֙ בָּעֵ֣ת הַהִ֔וא וַיֵּ֥רֶד יְהוּדָ֖ה מֵאֵ֣ת אֶחָ֑יו וַיֵּ֛ט עַד־אִ֥ישׁ עֲדֻלָּמִ֖י וּשְׁמ֥וֹ חִירָֽה׃", "palavras": [{"hebraico": "וַיְהִי", "transliteracao": "wayəhî", "morfossintaxe": "Conjunção (Waw consecutivo) + Prefixo 3ª pes. masc. sing. + Verbo Qal Imperfeito (apocopado).", "raiz_campo": "היה\n(h-y-h)\nSer, existir, acontecer.", "exegese": "Gramática: Verbo Lamed-He (a última consoante desaparece no imperfeito apocopado). Esta é a clássica fórmula narrativa do hebraico bíblico (\"E aconteceu que...\").\nOutras Conjugações: Nifal: ser feito, ocorrer, vir a existir.\nTeologia: A raiz hayah está ontologicamente ligada ao nome da aliança de Deus (YHWH - \"EU SOU\"). Em João 8:58, Jesus aplica o peso ontológico desta raiz a Si mesmo, reivindicando divindade."}, {"hebraico": "בָּעֵת", "transliteracao": "bāʿēt", "morfossintaxe": "Preposição inseparável (em/no) + Artigo Definido [patach] + Subst. comum fem. sing. absoluto.", "raiz_campo": "עתת / עדה\n(ʿ-t-t / ʿ-d-h)\nTempo, época, estação.", "exegese": "Contexto: \"Naquele tempo\" marca uma cesura drástica na Torá. A narrativa deixa a história de José (Gn 37) em suspense.\nTeologia (Providência): A interrupção foca na preservação da linhagem messiânica de Judá. A Confissão de Fé de Westminster ensina que a Providência de Deus governa todas as ações (Cap. V), utilizando até os pecados de Judá para garantir a linhagem da qual viria o Cristo."}, {"hebraico": "הַהִוא", "transliteracao": "hahîʾ", "morfossintaxe": "Artigo Definido (a/o) + Pronome Pessoal 3ª pes. fem. sing.", "raiz_campo": "היא\n(h-y-ʾ)\nAquela, ela.", "exegese": "Crítica Textual (Ketiv/Qere): O texto massorético está escrito com Waw (Ketiv = הִוא), mas a tradição de leitura indica que deve ser lido com Yod (Qere = הִיא). No Pentateuco, הוא é frequentemente usado como pronome épico/arcaico para ambos os gêneros, sendo uma forte evidência linguística da antiguidade mosaica do texto."}, {"hebraico": "וַיֵּרֶד", "transliteracao": "wayyēred", "morfossintaxe": "Conjunção (Waw consecutivo) + Prefixo 3ª pes. masc. sing. + Verbo Qal Imperfeito (apoc.).", "raiz_campo": "ירד\n(y-r-d)\nDescer.", "exegese": "Gramática: Verbo irregular (classe Pe-Yod). O Yod da raiz original desaparece no imperfeito.\nOutras Conjugações: Hifil: Fazer descer, derrubar; Hufal: Ser derrubado.\nTeologia: Geograficamente, Judá desceu das montanhas de Hebrom para a planície da Sefelá. Moralmente, \"descer\" reflete o declínio espiritual de afastar-se do acampamento da aliança patriarcal."}, {"hebraico": "יְהוּדָה", "transliteracao": "yəhûdāh", "morfossintaxe": "Substantivo Próprio Masculino Absoluto.", "raiz_campo": "ידה\n(y-d-h)\nJudá (Louvor, \"Que Deus seja louvado\").", "exegese": "Outras Conjugações (da raiz): Em Hifil, a raiz significa \"dar graças, louvar, confessar\".\nTeologia (NT): É a tribo eleita para o trono. Em Gênesis 49:8-10, Jacó profetiza que o cetro não se arredará de Judá. O ápice ocorre no Novo Testamento, quando Cristo é revelado como o \"Leão da Tribo de Judá\" (Apocalipse 5:5)."}, {"hebraico": "מֵאֵת", "transliteracao": "mēʾēt", "morfossintaxe": "Preposição [Min] (de, a partir de) + Preposição de companhia (com, junto a).", "raiz_campo": "מן + את\n(mn + ʾt)\nDe junto de, de perto de.", "exegese": "Contexto Exegético: A combinação destas preposições indica uma separação física e intencional. Judá retirou-se do convívio do clã da Aliança. Ele rompe o princípio reformado da \"antítese\" — a separação entre a Igreja e o mundo pagão."}, {"hebraico": "אֶחָיו", "transliteracao": "ʾeḥāyw", "morfossintaxe": "Substantivo masculino plural construto + Sufixo Pronominal 3ª pes. masc. sing. (dele).", "raiz_campo": "אחח\n(ʾ-ḥ-ḥ)\nIrmãos, parentes, companheiros de pacto.", "exegese": "Teologia (NT): A fraternidade terrena dos patriarcas falha miseravelmente (eles venderam José). No NT, Cristo atua como nosso \"Irmão mais velho\" perfeito, o primogênito entre muitos irmãos (Romanos 8:29), que jamais abandona sua família pactual."}, {"hebraico": "וַיֵּט", "transliteracao": "wayyēṭ", "morfossintaxe": "Conjunção (Waw consecutivo) + Prefixo 3ª pes. masc. sing. + Verbo Hifil Imperfeito (apocopado).", "raiz_campo": "נטה\n(n-ṭ-h)\nArmar (uma tenda), estender, inclinar.", "exegese": "Gramática: Raiz duplamente irregular (Pe-Nun e Lamed-He). O Nun inicial é assimilado (causando dagesh, mas o Yod o rejeita) e o He final desaparece na apócope.\nOutras Conjugações: Qal: inclinar, espalhar. Nifal: esticar-se.\nTipologia: \"Armar a tenda\". A morada com os cananeus prefigura, por antítese, a verdadeira morada divina. Em João 1:14 (ἐσκήνωσεν), o Verbo \"armou sua tenda / tabernaculou\" perfeitamente entre nós."}, {"hebraico": "עַד־", "transliteracao": "ʿad-", "morfossintaxe": "Preposição Direcional Absoluta (ligada por Maqqef).", "raiz_campo": "עדה\n(ʿ-d-h)\nAté, em direção a, para o lado de.", "exegese": "Contexto: Indica que o seu destino não foi acidental. Judá inclinou seus interesses até os cananeus deliberadamente."}, {"hebraico": "אִישׁ", "transliteracao": "ʾîš", "morfossintaxe": "Substantivo masculino singular construto (por aposição ao gentílico).", "raiz_campo": "איש / אנש\n(ʾ-y-š / ʾ-n-š)\nHomem, indivíduo varão.", "exegese": "Teologia (NT): É o oposto de Adam (humanidade genérica) ou Enosh (homem frágil/mortal). Jesus é revelado não apenas como Filho do Homem (Adam), mas como o Ish supremo, o marido provedor e perfeito da Sua Igreja (Efésios 5)."}, {"hebraico": "עֲדֻלָּמִי", "transliteracao": "ʿădullāmî", "morfossintaxe": "Substantivo Próprio de Localidade + Sufixo Gentílico (Adj. masc. sing.) [Hireq-Yod].", "raiz_campo": "עדלם\n(ʿ-d-l-m)\nAdulamita, habitante de Adulão.", "exegese": "Contexto: Adulão era uma cidade-estado cananeia influente na região.\nRedenção Histórica: Ironicamente, mais tarde na história da redenção, outro descendente da linha de Judá (Davi) buscaria refúgio na \"Caverna de Adulão\" fugindo de Saul (1 Sm 22:1). Lá ele acolhe os excluídos, sendo um tipo de Cristo que atrai os cansados e oprimidos."}, {"hebraico": "וּשְׁמוֹ", "transliteracao": "ûšəmô", "morfossintaxe": "Conjunção copulativa (Waw transformado em Shureq) + Subst. masc. sing. construto + Sufixo Pron. 3ª pes. masc. sing. (dele).", "raiz_campo": "שם\n(š-m)\nNome, reputação, fama.", "exegese": "Teologia (NT): No pensamento hebraico, o nome carrega o caráter e a essência do indivíduo. A teologia do \"Nome\" atinge sua majestade em Cristo: o \"Nome que está acima de todo nome\" (Filipenses 2:9-10)."}, {"hebraico": "חִירָה", "transliteracao": "ḥîrāh", "morfossintaxe": "Substantivo Próprio masculino absoluto.", "raiz_campo": "חור\n(ḥ-w-r)\nHira (Nobreza, Esplendor ou \"Livre\").", "exegese": "Curiosidade: Hira tornou-se companheiro inseparável de Judá. Mais tarde, no verso 12, ele o acompanha à tosquia, e no verso 20, serve como mediador para entregar o cabrito a Tamar. O nome é um Hapax legomenon nominal referencial (só existe na Bíblia para nomear esta pessoa específica)."}], "traducoes": {"ARA": "Aconteceu, naquele tempo, que Judá se apartou de seus irmãos e se hospedou na casa de um adulamita, chamado Hira.", "ACF": "E aconteceu no mesmo tempo que Judá desceu de entre seus irmãos, e entrou na casa de um homem adulamita, cujo nome era Hira.", "NAA": "Aconteceu, naquele tempo, que Judá se afastou de seus irmãos e foi morar na casa de um adulamita, chamado Hira.", "NVI": "Naquela época, Judá afastou-se de seus irmãos e foi morar na casa de um homem de Adulão, chamado Hira.", "NTLH": "Naquele tempo Judá se separou dos seus irmãos e foi morar na casa de um homem chamado Hira, que era da cidade de Adulã.", "KJA": "Por aquela mesma época, Judá afastou-se dos seus irmãos e foi morar com um homem de Adulão, chamado Hira.", "KJ": "And it came to pass at that time, that Judah went down from his brethren, and turned in to a certain Adullamite, whose name was Hirah.", "ESV": "It happened at that time that Judah went down from his brothers and turned in to a certain Adullamite, whose name was Hirah.", "NASB": "And it came about at that time, that Judah departed from his brothers and visited a certain Adullamite, whose name was Hirah.", "NIV": "At that time, Judah left his brothers and went down to stay with a man of Adullam named Hirah.", "LXX": "ἐγένετο δὲ ἐν τῷ καιρῷ ἐκείνῳ καὶ κατέβη Ιουδας ἀπὸ τῶν ἀδελφῶν αὐτοῦ καὶ ἀφίκετο ἕως πρὸς ἄνθρωπόν τινα Οδολλαμίτην, ᾧ ὄνομα Ειρας.", "Vulgata": "factum est eo tempore ut descenderet Iudas a fratribus suis et deverteret ad virum odollamitem vocabulo Hiram."}}, {"numero": 2, "texto_hebraico": "וַיַּרְא־שָׁ֧ם יְהוּדָ֛ה בַּת־אִ֥ישׁ כְּנַעֲנִ֖י וּשְׁמ֣וֹ שׁ֑וּעַ וַיִּקָּחֶ֖הָ וַיָּבֹ֥א אֵלֶֽיהָ׃", "palavras": [{"hebraico": "וַיַּרְא", "transliteracao": "wayyarʾ", "morfossintaxe": "Conjunção (Waw consecutivo) + Prefixo 3ª pes. masc. sing. + Verbo Qal Imperfeito (apocopado).", "raiz_campo": "ראה\n(r-ʾ-h)\nVer, olhar, inspecionar, perceber.", "exegese": "Gramática: Verbo Lamed-He (o He final cai no apocopado com o Waw consecutivo). O dagesh no Yod marca a duplicação da consoante pela assimilação.\nOutras Conjugações: Nifal: aparecer, ser visto. Hifil: mostrar, fazer ver. Hofal: ser mostrado. Hitpael: olhar um para o outro.\nTeologia Pactual: Este verbo inicia um ciclo de falha pactual constante nas Escrituras. Ecoa Gn 3:6 (Eva \"viu\" o fruto) e Gn 6:2 (os filhos de Deus \"viram\" as filhas dos homens). Judá é guiado pela vista e pelos sentidos corporais (\"concupiscência dos olhos\", 1 Jo 2:16), negligenciando o princípio da pureza exigido pela Aliança."}, {"hebraico": "שָׁם", "transliteracao": "šām", "morfossintaxe": "Advérbio de Lugar.", "raiz_campo": "שם\n(š-m)\nLá, ali, naquele lugar.", "exegese": "Contexto: O \"lá\" aponta de volta para Adulão (v.1). Indica geograficamente e espiritualmente o território fora do \"arraial\" da família pactual de Israel (Jacó)."}, {"hebraico": "יְהוּדָה", "transliteracao": "yəhûdāh", "morfossintaxe": "Substantivo Próprio Masculino Absoluto.", "raiz_campo": "ידה\n(y-d-h)\nLouvor, \"Que Deus seja louvado\".", "exegese": "Gramática: Atua como o sujeito sintático da oração principal (Judá viu).\nOutras Conjugações (da raiz): Hifil: dar graças, louvar, confessar. Hitpael: confessar pecados.\nTeologia: Apesar da etimologia ligada ao \"louvor\", as ações de Judá neste capítulo refletem o oposto. Contudo, pela Providência (um decreto inescrutável de Deus), desta linha maculada virá o Leão da Tribo de Judá (Ap 5:5), evidenciando que a graça da salvação não se baseia no mérito do ancestral, mas na eleição soberana de Deus."}, {"hebraico": "בַּת־", "transliteracao": "bat-", "morfossintaxe": "Substantivo feminino singular construto. Ligado por Maqqef (hífen) à palavra seguinte.", "raiz_campo": "בנה\n(b-n-h)\nFilha, donzela, vila.", "exegese": "Gramática: O estado construto indica posse ou relação essencial (\"filha de\").\nOutras Conjugações (da raiz verbal): Qal: edificar, construir. Nifal: ser edificado. O conceito hebraico é que a filha ou filho \"constrói\" a casa (descendência)."}, {"hebraico": "אִישׁ", "transliteracao": "ʾîš", "morfossintaxe": "Substantivo masculino singular construto (em cadeia com o gentílico).", "raiz_campo": "איש / אנש\n(ʾ-y-š / ʾ-n-š)\nHomem, marido, varão.", "exegese": "Uso: A expressão \"bat-ish\" (filha de um homem) enfatiza a linhagem humana e o status social do pai da moça na região."}, {"hebraico": "כְּנַעֲנִי", "transliteracao": "kənaʿănî", "morfossintaxe": "Substantivo Próprio / Adjetivo + Sufixo Gentílico masculino sing. (Hireq-Yod).", "raiz_campo": "כנע\n(k-n-ʿ)\nCananeu, mercador.", "exegese": "Outras Conjugações (da raiz): Nifal: ser subjugado, humilhado. Hifil: humilhar. A raiz reflete a maldição de Noé sobre Canaã (Gn 9:25).\nTeologia Reformada (Jugo Desigual): Este é o clímax da desobediência de Judá. A Confissão de Fé de Westminster (Cap. XXIV, Seção III) declara: \"é dever dos cristãos casar somente no Senhor. Portanto, os que professam a verdadeira religião reformada não devem casar com infiéis...\". Judá quebra a regra de ouro de Abraão e Isaque, aliando a semente santa à semente da serpente (canaã)."}, {"hebraico": "וּשְׁמוֹ", "transliteracao": "ûšəmô", "morfossintaxe": "Conjunção copulativa (Waw / shureq) + Subst. masc. sing. construto + Sufixo Pronom. 3ª pes. masc. sing.", "raiz_campo": "שם\n(š-m)\nNome, caráter, reputação.", "exegese": "Gramática: A conjunção Waw torna-se um Shureq (וּ) antes de um Shewa sonoro, regra básica da fonética hebraica. O sufixo \"seu/dele\" (וֹ) refere-se ao pai (Sua), e não à filha. A esposa de Judá permanece sem nome (anônima) neste relato, focando-se a genealogia no patriarca pagão."}, {"hebraico": "שׁוּעַ", "transliteracao": "šûaʿ", "morfossintaxe": "Substantivo Próprio masculino absoluto.", "raiz_campo": "שוע\n(š-w-ʿ)\nSua (\"Grito de socorro\" ou \"Riqueza\").", "exegese": "Outras Conjugações (da raiz): Piel: chorar por socorro, clamar.\nCuriosidade: Em 1 Crônicas 2:3, a esposa de Judá é identificada pelo título \"Bate-Sua\" (A filha de Sua). O autor foca no homem cananeu proeminente para demonstrar com quem Judá formou aliança política/familiar."}, {"hebraico": "וַיִּקָּחֶהָ", "transliteracao": "wayyiqqāḥehā", "morfossintaxe": "Conjunção (Waw consec.) + Pref. 3ªp masc. sing. + Verbo Qal Imperfeito + Sufixo Pronom. 3ªp fem. sing.", "raiz_campo": "לקח\n(l-q-ḥ)\nTomar, pegar, casar-se, arrebatar.", "exegese": "Gramática (Pe-Lamed): Verbo irregular. O Lamed (ל) da raiz é fracamente pronunciado e acaba sendo assimilado pelo Qof (ק), resultando em um Dagesh Forte (ponto) dentro do Qof para indicar a duplicação consoantal compensatória.\nOutras Conjugações: Nifal: ser tomado. Pual: ser levado. Hitpael: conter-se (fogo flash).\nTeologia/Contexto: \"Tomar\" uma mulher é o termo técnico para casamento. No entanto, a sequência imediata (sem mencionar dote, arranjo familiar ou bênção paterna) denota uma união impulsiva e impulsionada pela carne."}, {"hebraico": "וַיָּבֹא", "transliteracao": "wayyābōʾ", "morfossintaxe": "Conjunção (Waw consec.) + Prefixo 3ª pes. masc. sing. + Verbo Qal Imperfeito.", "raiz_campo": "בוא\n(b-w-ʾ)\nEntrar, vir, chegar.", "exegese": "Gramática: Verbo oco (Ayin-Waw/Yod). A raiz perde o Waw no imperfeito e apresenta vocalização compensatória (Qamets no Yod).\nOutras Conjugações: Hifil: trazer. Hofal: ser trazido.\nTeologia (Eufemismo): \"Entrar a\" ou \"vir para\" é o eufemismo bíblico padrão (e reverente) para a consumação do ato sexual. A Bíblia trata a intimidade com santidade e recato na narrativa."}, {"hebraico": "אֵלֶיהָ", "transliteracao": "ʾēleyhā", "morfossintaxe": "Preposição Direcional + Sufixo Pronominal 3ª pes. fem. sing.", "raiz_campo": "אל\n(ʾ-l)\nA ela, para ela, em direção a ela.", "exegese": "Gramática: Complementa o verbo de movimento (entrar) anterior, direcionando a ação para a \"filha de Sua\". Note a forma estendida da preposição (אלי) que ocorre antes de sufixos."}], "traducoes": {"ARA": "Viu ali Judá a filha de um cananeu, cujo nome era Sua; tomou-a por mulher e a possuiu.", "ACF": "E viu Judá ali a filha de um homem cananeu, cujo nome era Sua; e tomou-a, e entrou a ela.", "NAA": "Viu ali Judá a filha de um cananeu, chamado Sua. Ele casou com ela e a possuiu.", "NVI": "Ali Judá conheceu a filha de um cananeu chamado Sua. Ele casou-se com ela e a possuiu;", "NTLH": "Ali ele conheceu a filha de um cananeu chamado Sua; ele casou com ela, e eles tiveram relações.", "KJA": "Lá conheceu Judá a filha de um cananeu chamado Sua, tomou-a por esposa e a possuiu.", "KJ": "And Judah saw there a daughter of a certain Canaanite, whose name was Shuah; and he took her, and went in unto her.", "ESV": "There Judah saw the daughter of a certain Canaanite whose name was Shua. He took her and went in to her,", "NASB": "Judah saw there a daughter of a certain Canaanite whose name was Shua; and he took her and went in to her.", "NIV": "There Judah met the daughter of a Canaanite man named Shua. He married her and made love to her;", "LXX": "καὶ εἶδεν ἐκεῖ Ιουδας θυγατέρα ἀνθρώπου Χαναναίου ᾗ ὄνομα Σαυα καὶ ἔλαβεν αὐτὴν καὶ εἰσῆλθεν πρὸς αὐτήν", "Vulgata": "viditque ibi Iudas filiam hominis chananei vocabulo Sue et adprehensam eam introiit ad illam"}}, {"numero": 3, "texto_hebraico": "וַתַּ֖הַר וַתֵּ֣לֶד בֵּ֑ן וַיִּקְרָ֥א אֶת־שְׁמ֖וֹ עֵֽר׃", "palavras": [{"hebraico": "וַתַּהַר", "transliteracao": "wattahar", "morfossintaxe": "Conjunção (Waw consecutivo) + Prefixo 3ª pes. fem. sing. + Verbo Qal Imperfeito (apocopado).", "raiz_campo": "הרה\n(h-r-h)\nConceber, ficar grávida.", "exegese": "Gramática: Verbo Lamed-He (o \"He\" final cai no imperfeito apocopado). O prefixo Tav (ת) indica claramente o sujeito feminino (\"ela concebeu\", a filha de Sua).\nOutras Conjugações: Pual: ser concebido. Poel: engravidar (fazer conceber).\nTeologia (Providência): Apesar de a união de Judá ter violado os princípios de separação da aliança patriarcal (jugo desigual com cananeia), a concepção evidencia a Providência Divina. Conforme a CFW (Cap. V), Deus ordena todas as coisas soberanamente, usando ações secundárias (mesmo as pecaminosas) para cumprir Seu conselho: a semente precisava prosperar para a linhagem messiânica."}, {"hebraico": "וַתֵּלֶד", "transliteracao": "wattēled", "morfossintaxe": "Conjunção (Waw consecutivo) + Prefixo 3ª pes. fem. sing. + Verbo Qal Imperfeito (apocopado).", "raiz_campo": "ילד\n(y-l-d)\nDar à luz, gerar, parir.", "exegese": "Gramática: Verbo irregular Pe-Yod (ou Pe-Waw). No imperfeito, o Yod inicial do radical desaparece, e as vogais são ajustadas (Segol) para compensar a perda.\nOutras Conjugações: Nifal: nascer. Piel: agir como parteira. Hifil: gerar (aplicado ao pai).\nContexto Redentivo: A raiz Y-L-D é o coração das \"Toledot\" (Genealogias) de Gênesis. Este nascimento marca o início biológico da \"Tribo de Judá\", apontando teleologicamente para a encarnação perfeita, quando Maria \"deu à luz\" (Mt 1:25) o Filho de Deus."}, {"hebraico": "בֵּן", "transliteracao": "bēn", "morfossintaxe": "Substantivo masculino singular absoluto.", "raiz_campo": "בנה\n(b-n-h)\nFilho, rapaz.", "exegese": "Etimologia: A palavra para \"filho\" (bēn) deriva da raiz verbal \"bana\" (construir). O pensamento semítico concebe o filho como aquele que \"constrói a casa\" ou a dinastia da família.\nTeologia: Nascer \"homem\" e \"primogênito\" concedia o duplo direito de herança e liderança espiritual. No entanto, Er fracassará miseravelmente em ambas as funções."}, {"hebraico": "וַיִּקְרָא", "transliteracao": "wayyiqrāʾ", "morfossintaxe": "Conjunção (Waw consecutivo) + Prefixo 3ª pes. masc. sing. + Verbo Qal Imperfeito.", "raiz_campo": "קרא\n(q-r-ʾ)\nChamar, clamar, nomear.", "exegese": "Gramática: Verbo Lamed-Aleph (o Aleph final é quiescente/mudo na pronúncia e não leva sinal vocálico).\nContraste Morfológico: Note a mudança crucial do prefixo! Sai o Tav feminino (ela deu à luz) e entra o Yod masculino (\"ELE chamou/nomeou\"). O sujeito agora é Judá. Curiosamente, nos próximos filhos (versos 4 e 5), quem dá o nome é a mãe. Esta alternância reflete dinâmicas de autoridade na família patriarcal.\nTeologia: Nomear na Bíblia não é apenas dar um rótulo, mas declarar destino, essência ou posse. Deus exerce o direito de nomear primeiro (Gn 1), e delega isso a Adão. Judá exerce aqui sua autoridade pactual como chefe da família."}, {"hebraico": "אֶת־", "transliteracao": "ʾet-", "morfossintaxe": "Partícula (Marcador de Objeto Direto Definido) ligada por Maqqef (hífen).", "raiz_campo": "את\n(ʾ-t)\n[Sem tradução literal - indica o objeto que sofre a ação verbal]", "exegese": "Gramática: Ocorre apenas antes de substantivos definidos (como pronomes, nomes próprios ou palavras com sufixo pronominal, como é o caso da próxima palavra \"seu nome\"). Aponta exatamente para onde recai o verbo \"nomear\"."}, {"hebraico": "שְׁמוֹ", "transliteracao": "šəmô", "morfossintaxe": "Substantivo masculino singular construto + Sufixo Pronominal 3ª pes. masc. sing. (dele).", "raiz_campo": "שם\n(š-m)\nNome (dele).", "exegese": "Sintaxe: Serve como o objeto direto do verbo anterior (\"ele chamou o NOME DELE...\")."}, {"hebraico": "עֵר׃", "transliteracao": "ʿēr", "morfossintaxe": "Substantivo Próprio masculino absoluto. Acompanhado do Sof Pasuq (dois pontos finais) que encerra o versículo.", "raiz_campo": "עור\n(ʿ-w-r)\nEr (\"Desperto\", \"Vigilante\" ou \"Inimigo\").", "exegese": "Outras Conjugações (da raiz): Nifal: ser acordado. Hifil: despertar, agitar.\nTeologia (Depravação Total): Ironicamente, o menino nomeado como \"Desperto\" ou \"Vigilante\" adormeceu rapidamente na impiedade. No verso 7, a narrativa diz que \"Er era mau aos olhos do Senhor\" e Deus o matou. A Teologia Reformada aponta que a filiação natural à aliança não infunde graça salvífica inerente. Sem a regeneração (Graça Eficaz), a Depravação Total (CFW Cap. VI) domina, culminando em juízo divino, mesmo para o primogênito da tribo real."}], "traducoes": {"ARA": "Ela concebeu e deu à luz um filho; e o pai lhe chamou Er.", "ACF": "E ela concebeu, e deu à luz um filho, e ele chamou o seu nome Er.", "NAA": "Ela ficou grávida e deu à luz um filho; e Judá lhe deu o nome de Er.", "NVI": "ela engravidou e deu à luz um filho, a quem Judá deu o nome de Er.", "NTLH": "Ela ficou grávida e deu à luz um filho. E Judá pôs nele o nome de Er.", "KJA": "e ela engravidou e deu à luz um menino, ao qual ele chamou de Er.", "KJ": "And she conceived, and bare a son; and he called his name Er.", "ESV": "She conceived and bore a son, and he called his name Er.", "NASB": "So she conceived and bore a son and he named him Er.", "NIV": "she became pregnant and gave birth to a son, who was named Er.", "LXX": "καὶ συλλαβοῦσα ἔτεκεν υἱόν, καὶ ἐκάλεσεν τὸ ὄνομα αὐτοῦ Ηρ.", "Vulgata": "quae concepit et peperit filium vocavitque nomen eius Her."}}, {"numero": 4, "texto_hebraico": "וַתַּ֥הַר ע֖וֹד וַתֵּ֣לֶד בֵּ֑ן וַתִּקְרָ֥א אֶת־שְׁמ֖וֹ אוֹנָֽן׃", "palavras": [{"hebraico": "וַתַּהַר", "transliteracao": "wattahar", "morfossintaxe": "Conjunção (Waw consecutivo) + Prefixo 3ª pes. fem. sing. + Verbo Qal Imperfeito (apocopado).", "raiz_campo": "הרה\n(h-r-h)\nConceber, ficar grávida.", "exegese": "Gramática: Mesma forma do versículo anterior. Verbo Lamed-He (o \"He\" final cai no imperfeito apocopado). O sujeito continua sendo a \"filha de Sua\", a esposa cananeia de Judá."}, {"hebraico": "עוֹד", "transliteracao": "ʿôd", "morfossintaxe": "Advérbio.", "raiz_campo": "עוד\n(ʿ-w-d)\nAinda, novamente, de novo, mais uma vez.", "exegese": "Raiz Verbal: A raiz verbal 'ud significa \"retornar\", \"repetir\" ou \"testemunhar\". Como advérbio, indica a repetição imediata da ação.\nContexto: O fluxo narrativo demonstra uma rápida sucessão de nascimentos. Deus continua concedendo fertilidade a essa união, preparando o palco para o juízo e a redenção subsequentes na família de Judá."}, {"hebraico": "וַתֵּלֶד", "transliteracao": "wattēled", "morfossintaxe": "Conjunção (Waw consecutivo) + Prefixo 3ª pes. fem. sing. + Verbo Qal Imperfeito (apocopado).", "raiz_campo": "ילד\n(y-l-d)\nDar à luz, gerar, parir.", "exegese": "Gramática: Verbo irregular Pe-Yod. O Yod desaparece, assim como no verso 3. O texto reitera a formação natural da família."}, {"hebraico": "בֵּן", "transliteracao": "bēn", "morfossintaxe": "Substantivo masculino singular absoluto.", "raiz_campo": "בנה\n(b-n-h)\nFilho, rapaz.", "exegese": "Contexto: Mais um homem é adicionado à casa de Judá. Pela ordem natural e consuetudinária, este é o segundo na linha de sucessão e herança (depois de Er)."}, {"hebraico": "וַתִּקְרָא", "transliteracao": "wattiqrāʾ", "morfossintaxe": "Conjunção (Waw consecutivo) + Prefixo 3ª pes. fem. sing. + Verbo Qal Imperfeito.", "raiz_campo": "קרא\n(q-r-ʾ)\nChamar, clamar, nomear.", "exegese": "Contraste Morfológico Crucial: No verso 3, lemos wa-yyiqra (com Yod, masculino: ELE nomeou). Aqui, lemos wa-ttiqra (com Tav, feminino: ELA nomeou). A mudança gramatical aponta que a esposa cananeia assumiu a prerrogativa de nomear o filho.\nTeologia Reformada (A Queda da Liderança): O ato de nomear reflete autoridade (Gn 2:19-20). Judá nomeou o primogênito, mas os filhos subsequentes (Onã e Selá) são nomeados pela mãe (cananeia). Comentaristas reformados observam que o jugo desigual (CFW XXIV) corrói a liderança espiritual. A influência cananeia estava ganhando raízes no coração do lar patriarcal, culminando no comportamento ímpio que esses filhos demonstrariam mais tarde."}, {"hebraico": "אֶת־", "transliteracao": "ʾet-", "morfossintaxe": "Partícula (Marcador de Objeto Direto Definido) ligada por Maqqef (hífen).", "raiz_campo": "את\n(ʾ-t)\n[Sem tradução literal]", "exegese": "Gramática: Marca a transição da ação de \"nomear\" feita pela mãe diretamente para a identidade (\"seu nome\") da criança."}, {"hebraico": "שְׁמוֹ", "transliteracao": "šəmô", "morfossintaxe": "Substantivo masculino singular construto + Sufixo Pronominal 3ª pes. masc. sing. (dele).", "raiz_campo": "שם\n(š-m)\nNome (dele).", "exegese": "Sintaxe: Objeto direto de wattiqra."}, {"hebraico": "אוֹנָן׃", "transliteracao": "ʾônān", "morfossintaxe": "Substantivo Próprio masculino absoluto. Acompanhado do Sof Pasuq.", "raiz_campo": "און\n(ʾ-w-n)\nOnã (\"Forte\", \"Vigoroso\" ou \"Dor/Iniquidade\").", "exegese": "Etimologia e Teologia: A raiz tem duplo sentido na literatura hebraica. Pode derivar de 'on (\"força\", \"virilidade\" - como em Gn 49:3) ou de 'awen (\"dor\", \"sofrimento\", \"iniquidade\").\nTeologia (Depravação Total): Ironicamente, o homem nomeado possivelmente por sua \"virilidade\", futuramente usará dessa mesma virilidade para pecar intencionalmente contra a aliança (\"derramando seu sêmen na terra\" - o pecado de Onã, v.9). Sua recusa egoísta em suscitar descendência para o irmão morto demonstra o domínio da Depravação Total (CFW VI) em seu coração, o que atrai a justa ira e execução divina (v.10). A semente sagrada da mulher (Gn 3:15) estava sendo ameaçada pelo egoísmo humano, exigindo a severa providência de Deus."}], "traducoes": {"ARA": "Tornou ela a conceber e deu à luz um filho, a quem chamou Onã.", "ACF": "E ela tornou a conceber, e deu à luz um filho, e chamou o seu nome Onã.", "NAA": "Ela ficou grávida de novo e deu à luz um filho, a quem deu o nome de Onã.", "NVI": "Ela engravidou de novo, deu à luz mais um filho e deu-lhe o nome de Onã.", "NTLH": "Ela ficou grávida de novo e deu à luz outro filho. E pôs nele o nome de Onã.", "KJA": "Ela engravidou novamente, deu à luz mais um filho, a quem deu o nome de Onã.", "KJ": "And she conceived again, and bare a son; and she called his name Onan.", "ESV": "She conceived again and bore a son, and she called his name Onan.", "NASB": "She conceived again and bore a son and named him Onan.", "NIV": "She became pregnant again and gave birth to a son, and she named him Onan.", "LXX": "καὶ συλλαβοῦσα ἔτι ἔτεκεν υἱόν, καὶ ἐκάλεσεν τὸ ὄνομα αὐτοῦ Αυναν.", "Vulgata": "rursumque concipiens genuit filium quem vocavit Onan."}}, {"numero": 5, "texto_hebraico": "וַתֹּ֤סֶף עוֹד֙ וַתֵּ֣לֶד בֵּ֔ן וַתִּקְרָ֥א אֶת־שְׁמ֖וֹ שֵׁלָ֑ה וְהָיָ֥ה בִכְזִ֖יב בְּלִדְתָּ֥הּ אֹתֽוֹ׃", "palavras": [{"hebraico": "וַתּוֹסֶף", "transliteracao": "wattôsep", "morfossintaxe": "Conjunção (Waw consec.) + Prefixo 3ª pes. fem. sing. + Verbo Hifil Imperfeito (apocopado).", "raiz_campo": "יסף\n(y-s-p)\nAcrescentar, proceder a fazer novamente, continuar.", "exegese": "Gramática: Verbo irregular Pe-Yod. No Hifil, o Yod original da raiz frequentemente se torna um Holem-Waw (וֹ) como vogal longa compensatória. A forma apocopada perde a vogal final para encurtar a palavra.\nSintaxe Idiomática: A estrutura \"ela acrescentou ainda e deu à luz\" é um hebraísmo clássico para dizer \"ela deu à luz mais uma vez\"."}, {"hebraico": "עוֹד", "transliteracao": "ʿôd", "morfossintaxe": "Advérbio.", "raiz_campo": "עוד\n(ʿ-w-d)\nAinda, novamente.", "exegese": "Contexto: Enfatiza a notável fertilidade da esposa cananeia, estabelecendo rapidamente três potenciais herdeiros."}, {"hebraico": "וַתֵּלֶד", "transliteracao": "wattēled", "morfossintaxe": "Conjunção (Waw consec.) + Pref. 3ªp fem. sing. + Verbo Qal Imperfeito (apocopado).", "raiz_campo": "ילד\n(y-l-d)\nDar à luz.", "exegese": "Nota: Mesma forma dos versos 3 e 4. Consolida o ciclo de nascimentos que formará os troncos iniciais da tribo de Judá."}, {"hebraico": "בֵּן", "transliteracao": "bēn", "morfossintaxe": "Substantivo masculino singular absoluto.", "raiz_campo": "בנה\n(b-n-h)\nFilho.", "exegese": "Teologia: Três filhos formam uma família completa no mundo antigo. A providência divina garantiu a descendência. Mais tarde, após a morte de Er e Onã sob juízo divino, Selá será o único sobrevivente desta trindade inicial de filhos (embora a linha real messiânica venha a passar por Perez, filho de Tamar)."}, {"hebraico": "וַתִּקְרָא", "transliteracao": "wattiqrāʾ", "morfossintaxe": "Conjunção (Waw consec.) + Prefixo 3ª pes. fem. sing. + Verbo Qal Imperfeito.", "raiz_campo": "קרא\n(q-r-ʾ)\nChamar, nomear.", "exegese": "Gramática Avançada: Novamente, o prefixo feminino Tav é utilizado. Confirma-se o padrão estabelecido no verso 4: a mãe cananeia toma a frente na nomeação. Judá está passivo ou fisicamente ausente neste momento, o que evidencia o avanço da influência pagã no lar pactual."}, {"hebraico": "אֶת־", "transliteracao": "ʾet-", "morfossintaxe": "Partícula (Marcador de Objeto Direto) com Maqqef.", "raiz_campo": "את\n(ʾ-t)\n[Sem tradução literal]", "exegese": "Acompanha o objeto definido \"o nome dele\"."}, {"hebraico": "שְׁמוֹ", "transliteracao": "šəmô", "morfossintaxe": "Subst. masc. sing. construto + Suf. Pron. 3ª pes. masc. sing. (dele).", "raiz_campo": "שם\n(š-m)\nNome (dele).", "exegese": "O alvo da ação de nomear."}, {"hebraico": "שֵׁלָה", "transliteracao": "šēlāh", "morfossintaxe": "Substantivo Próprio masculino absoluto.", "raiz_campo": "שלה / שאל\n(š-l-h / š-ʾ-l)\nSelá (\"Petição\", \"Tranquilo\" ou \"Seguro\").", "exegese": "Etimologia: A raiz pode estar ligada a \"paz/quietude\" (shalah) ou a uma \"petição\" (raiz sha'al).\nCuriosidade: Selá será o único destes três filhos a não morrer pelas mãos do Senhor neste capítulo, vindo a ser o fundador do clã dos selenitas (Nm 26:20). Porém, Judá falhará covardemente em dá-lo a Tamar (v.11), temendo que ele também morresse."}, {"hebraico": "וְהָיָה", "transliteracao": "wəhāyāh", "morfossintaxe": "Conjunção (Waw copulativo) + Verbo Qal Perfeito 3ª pes. masc. sing.", "raiz_campo": "היה\n(h-y-h)\nSer, estar.", "exegese": "Sintaxe (Circunstancial): O verbo está no masculino singular (\"e ELE estava\"). A cláusula introduz uma informação circunstancial importante sobre o paradeiro de Judá durante este terceiro nascimento."}, {"hebraico": "בִכְזִיב", "transliteracao": "bikzîb", "morfossintaxe": "Preposição Inseparável (em/no) + Substantivo Próprio de Localidade.", "raiz_campo": "כזב\n(k-z-b)\nQuezibe / Aczibe (Engano, Mentira, Falha).", "exegese": "Teologia / Geografia: A raiz kazab significa \"mentir\" ou \"falhar\" (como um riacho que seca e engana o viajante, cf. Mq 1:14). Mêncionar geograficamente onde Judá estava serve como um trocadilho teológico (paranomásia) indicando a vida de enganos e mentiras na qual Judá havia entrado ao se afastar de sua família pactual."}, {"hebraico": "בְּלִדְתָּהּ", "transliteracao": "bəlidtāh", "morfossintaxe": "Preposição (em/ao) + Verbo Qal Infinitivo Construto + Suf. Pron. 3ª pes. fem. sing. (dela).", "raiz_campo": "ילד\n(y-l-d)\nAo dar à luz dela / Quando ela deu à luz.", "exegese": "Gramática: A preposição Bet (ב) anexada a um infinitivo construto hebraico forma uma oração temporal (\"quando/no tempo em que...\"). Confirma a ausência de Judá durante o evento."}, {"hebraico": "אֹתוֹ׃", "transliteracao": "ʾōtô", "morfossintaxe": "Partícula (Marcador de Objeto Direto) + Suf. Pron. 3ª pes. masc. sing. (ele/o).", "raiz_campo": "את\n(ʾ-t)\nA ele / O.", "exegese": "Completa a oração temporal: \"quando ela O deu à luz\". Seguido pelo Sof Pasuq (fim do verso)."}], "traducoes": {"ARA": "Continuou ainda e deu à luz um filho, a quem chamou Selá; e Judá se achava em Quezibe, quando ela o deu à luz.", "ACF": "E continuou ainda, e deu à luz um filho, e chamou o seu nome Selá; e Judá estava em Quezibe, quando ela o deu à luz.", "NAA": "Ela engravidou mais uma vez e deu à luz um filho, a quem deu o nome de Selá. E Judá estava em Quezibe, quando ela o deu à luz.", "NVI": "Mais uma vez engravidou, teve um filho e deu-lhe o nome de Selá. Foi em Quezibe que ela o deu à luz.", "NTLH": "Mais uma vez ela ficou grávida e deu à luz um filho, que recebeu o nome de Selá. Judá estava na cidade de Quezibe quando esse filho nasceu.", "KJA": "Engravidou ainda uma terceira vez, deu à luz um menino e o chamou de Selá; e Judá estava em Quezibe, quando ele nasceu.", "KJ": "And she yet again conceived, and bare a son; and called his name Shelah: and he was at Chezib, when she bare him.", "ESV": "She conceived again and bore a son, and she called his name Shelah. Judah was in Chezib when she bore him.", "NASB": "She bore still another son and named him Shelah; and it was at Chezib that she bore him.", "NIV": "She gave birth to still another son and named him Shelah. It was at Kezib that she gave birth to him.", "LXX": "καὶ προσθεῖσα ἔτι ἔτεκεν υἱόν καὶ ἐκάλεσεν τὸ ὄνομα αὐτοῦ Σηλω· αὕτη δὲ ἦν ἐν Χασβι, ἡνίκα ἔτεκεν αὐτόν.", "Vulgata": "pariensque tertium appellavit Selam quo nato parere ultra cessavit."}}, {"numero": 6, "texto_hebraico": "וַיִּקַּ֧ח יְהוּדָ֛ה אִשָּׁ֖ה לְעֵ֣ר בְּכוֹר֑וֹ וּשְׁמָ֖הּ תָּמָֽר׃", "palavras": [{"hebraico": "וַיִּקַּח", "transliteracao": "wayyiqqaḥ", "morfossintaxe": "Conjunção (Waw consec.) + Pref. 3ª pes. masc. sing. + Verbo Qal Imperfeito (apocopado).", "raiz_campo": "לקח\n(l-q-ḥ)\nTomar, pegar, selecionar (uma esposa).", "exegese": "Gramática: Verbo irregular (Pe-Lamed). Como visto no verso 2, o Lamed da raiz é assimilado no Qof, resultando em um Dagesh Forte (ponto duplicador) dentro do Qof.\nContexto: Judá reassume o papel ativo. No verso 2 ele \"tomou\" (wayyiqqaḥ) uma esposa para si, baseado na concupiscência visual. Agora ele \"toma\" uma esposa para seu filho, exercendo o dever patriarcal de arranjar casamentos."}, {"hebraico": "יְהוּדָה", "transliteracao": "yəhûdāh", "morfossintaxe": "Substantivo Próprio Masculino Absoluto.", "raiz_campo": "ידה\n(y-d-h)\nJudá.", "exegese": "Sintaxe: Sujeito explícito da oração. Ele volta ao centro das decisões da família após o lapso dos nascimentos em que a esposa cananeia tomou a frente."}, {"hebraico": "אִשָּׁה", "transliteracao": "ʾiššāh", "morfossintaxe": "Substantivo feminino singular absoluto.", "raiz_campo": "אנש / אשה\n(ʾ-n-š / ʾ-š-h)\nMulher, esposa.", "exegese": "Gramática: O Dagesh no Shin compensa a assimilação do Nun original da raiz (anash -> ishshah). Objeto direto da ação de Judá."}, {"hebraico": "לְעֵר", "transliteracao": "ləʿēr", "morfossintaxe": "Preposição Inseparável (para, a) + Substantivo Próprio masculino absoluto.", "raiz_campo": "עור\n(ʿ-w-r)\nPara Er.", "exegese": "Contexto: O beneficiário da ação de Judá. Conforme o costume do antigo Oriente Próximo, o patriarca providenciava o casamento do primogênito para garantir a continuidade da linhagem e a preservação da herança."}, {"hebraico": "בְּכוֹרוֹ", "transliteracao": "bəkôrô", "morfossintaxe": "Substantivo masculino singular construto + Suf. Pron. 3ª pes. masc. sing. (dele).", "raiz_campo": "בכר\n(b-k-r)\nPrimogênito (dele).", "exegese": "Teologia Reformada (A Semente): A palavra bekhor é densa teologicamente. O primogênito carrega o direito de nascença e é a principal esperança pactual (a semente). Ao enfatizar \"seu primogênito\", o texto hebraico eleva a tensão literária: a promessa messiânica de Gênesis 3:15 repousa momentaneamente sobre Er. Contudo, o próximo verso revelará a falência moral deste herdeiro."}, {"hebraico": "וּשְׁמָהּ", "transliteracao": "ûšəmāhh", "morfossintaxe": "Conjunção copulativa (Waw - Shureq) + Subst. construto + Suf. Pron. 3ª pes. fem. sing. (dela).", "raiz_campo": "שם\n(š-m)\nE o nome (dela).", "exegese": "Gramática (O Mappiq): O ponto dentro do He final (הּ) chama-se Mappiq. Ele instrui o leitor a pronunciar o He como uma consoante gutural forte, não apenas como uma vogal final silenciosa. É a marca morfológica absoluta do sufixo feminino \"dela\" em hebraico."}, {"hebraico": "תָּמָר׃", "transliteracao": "tāmār", "morfossintaxe": "Substantivo Próprio feminino absoluto. Acompanhado do Sof Pasuq (dois pontos finais).", "raiz_campo": "תמר\n(t-m-r)\nTamar (Palmeira / Tamareira).", "exegese": "Etimologia e Tipologia: A palmeira/tamareira (tamar) no Oriente Próximo é símbolo de resistência, beleza (Ct 7:7), retidão (Sl 92:12 - \"O justo florescerá como a palmeira\") e frutificação abundante no deserto.\nTeologia (A Providência de Deus): Contrastando com \"Er\" (cuja retidão falhou), Tamar fará jus ao seu nome. Embora suas ações futuras neste capítulo sejam complexas e controversas moralmente, o texto sagrado (através das palavras do próprio Judá no v. 26: \"Ela é mais justa do que eu\") a valida como o instrumento providencial escolhido por Deus para evitar a extinção da semente pactual. Como a palmeira que resiste à seca, ela resistirá ao abandono da família de Judá para garantir a linhagem que chegará até o Messias (Mt 1:3)."}], "traducoes": {"ARA": "Judá tomou para Er, o seu primogênito, uma mulher, cujo nome era Tamar.", "ACF": "E Judá tomou uma mulher para Er, o seu primogênito; e o seu nome era Tamar.", "NAA": "Judá tomou para Er, o seu primogênito, uma mulher, cujo nome era Tamar.", "NVI": "Judá escolheu uma mulher chamada Tamar para Er, o seu primogênito.", "NTLH": "Judá arranjou uma mulher chamada Tamar para Er, o seu filho mais velho.", "KJA": "Judá tomou uma esposa para Er, seu primogênito; e ela se chamava Tamar.", "KJ": "And Judah took a wife for Er his firstborn, whose name was Tamar.", "ESV": "And Judah took a wife for Er his firstborn, and her name was Tamar.", "NASB": "Now Judah took a wife for Er his firstborn, and her name was Tamar.", "NIV": "Judah got a wife for Er, his firstborn, and her name was Tamar.", "LXX": "καὶ ἔλαβεν Ιουδας γυναῖκα τῷ Ηρ τῷ πρωτοτόκῳ αὐτοῦ, ᾗ ὄνομα Θαμαρ.", "Vulgata": "deditque Iudas uxorem Her primogenito suo nomine Thamar."}}, {"numero": 7, "texto_hebraico": "וַיְהִ֗י עֵ֚ר בְּכ֣וֹר יְהוּדָ֔ה רַ֖ע בְּעֵינֵ֣י יְהוָ֑ה וַיְמִתֵ֖הוּ יְהוָֽה׃", "palavras": [{"hebraico": "וַיְהִי", "transliteracao": "wayəhî", "morfossintaxe": "Conjunção (Waw consecutivo) + Pref. 3ª pes. masc. sing. + Verbo Qal Imperfeito (apocopado).", "raiz_campo": "היה\n(h-y-h)\nSer, estar, tornar-se.", "exegese": "Sintaxe: Serve aqui como verbo de ligação (cópula) introduzindo o estado existencial de Er: \"E Er era/tornou-se...\"."}, {"hebraico": "עֵר", "transliteracao": "ʿēr", "morfossintaxe": "Substantivo Próprio masculino absoluto.", "raiz_campo": "עור\n(ʿ-w-r)\nEr (\"Vigilante\").", "exegese": "Contexto: O sujeito principal da oração de juízo."}, {"hebraico": "בְּכוֹר", "transliteracao": "bəkôr", "morfossintaxe": "Substantivo masculino singular construto.", "raiz_campo": "בכר\n(b-k-r)\nPrimogênito (de).", "exegese": "Sintaxe e Teologia: A aposição \"primogênito de Judá\" não é um mero detalhe genealógico, mas um agravante teológico. Ele era o principal herdeiro das promessas pactuais abraâmicas dentro da tribo escolhida, tornando sua rebelião ainda mais grave aos olhos de Deus."}, {"hebraico": "יְהוּדָה", "transliteracao": "yəhûdāh", "morfossintaxe": "Substantivo Próprio Masculino Absoluto.", "raiz_campo": "ידה\n(y-d-h)\nJudá.", "exegese": "Completando o estado construto anterior: o detentor da aliança."}, {"hebraico": "רַע", "transliteracao": "raʿ", "morfossintaxe": "Adjetivo masculino singular absoluto.", "raiz_campo": "רעע\n(r-ʿ-ʿ)\nMau, perverso, nocivo, desagradável.", "exegese": "Teologia (Depravação Total): A raiz ra'a é a antítese do tov (bom) da criação. Este adjetivo sela o diagnóstico espiritual de Er. A Confissão de Fé de Westminster (Cap. VI, Seção II e IV) declara que por causa da queda, os homens tornaram-se \"inteiramente corrompidos em todas as faculdades e partes da alma e do corpo\", o que os torna \"inclinados a todo o mal\". A hereditariedade pactual não imunizou Er da corrupção de sua natureza. A Escritura silencia reverentemente sobre qual foi o pecado específico de Er, enfatizando apenas a avaliação divina de sua natureza."}, {"hebraico": "בְּעֵינֵי", "transliteracao": "bəʿênê", "morfossintaxe": "Preposição Inseparável (em/aos) + Substantivo Dual Construto.", "raiz_campo": "עין\n(ʿ-y-n)\nAos olhos de / Na visão de.", "exegese": "Antropomorfismo: Expressão idiomática que denota o escrutínio e o juízo onisciente de Deus. O que poderia parecer normal ou oculto na sociedade cananeia (ou mesmo para Judá) estava exposto diante do Juiz de toda a terra."}, {"hebraico": "יְהוָה", "transliteracao": "Yahweh / Adonai", "morfossintaxe": "Substantivo Próprio Masculino Absoluto.", "raiz_campo": "הוה / היה\n(h-w-h / h-y-h)\nYHWH / O SENHOR.", "exegese": "Teologia Pactual: O uso do nome pactual (Tetragrama) em vez de Elohim (Deus Criador) sublinha que este é um juízo de quebra de aliança. YHWH avalia o membro de sua própria família da aliança e o condena."}, {"hebraico": "וַיְמִתֵהוּ", "transliteracao": "wayəmitēhû", "morfossintaxe": "Conjunção (Waw consec.) + Pref. 3ªp masc. sing. + Verbo Hifil Imperfeito + Suf. Pron. 3ªp masc. sing. (o/a ele).", "raiz_campo": "מות\n(m-w-t)\nMatar, fazer morrer, executar.", "exegese": "Gramática Avançada: Verbo \"oco\" (Ayin-Waw). A forma aqui é o Hifil (causativo). A vogal Tzere (e longo) sob o Tav ocorre devido à adição do sufixo pronominal hu (ele). Literalmente: \"E ele o fez morrer\".\nTeologia da Providência e Juízo: Esta é uma das declarações mais formidáveis da soberania divina sobre a vida e a morte (cf. Dt 32:39 \"Eu mato, e eu faço viver\"). YHWH não apenas \"permitiu\" que Er morresse; o verbo causativo ativo garante que Deus foi o executor direto do juízo retributivo. Como expõe a CFW (Cap. V, Seção VI), Deus, como justo juiz, pune o impenitente, retendo Sua graça e entregando-o ao julgamento imediato para preservar a pureza de Sua aliança."}, {"hebraico": "יְהוָה׃", "transliteracao": "Yahweh / Adonai", "morfossintaxe": "Substantivo Próprio Masculino Absoluto. Seguido do Sof Pasuq.", "raiz_campo": "הוה / היה\n(h-w-h / h-y-h)\nYHWH / O SENHOR.", "exegese": "Sintaxe: O sujeito explícito do verbo \"matar\". O texto repete o nome de Deus para não deixar nenhuma margem a dúvidas: a morte prematura do herdeiro não foi uma fatalidade cananeia, mas a mão pesada da justiça do Deus da Aliança."}], "traducoes": {"ARA": "Er, o primogênito de Judá, porém, era mau aos olhos do SENHOR, pelo que o SENHOR o matou.", "ACF": "Er, porém, o primogênito de Judá, era mau aos olhos do SENHOR, por isso o SENHOR o matou.", "NAA": "Er, o primogênito de Judá, era mau aos olhos do SENHOR, e por isso o SENHOR o matou.", "NVI": "Mas Er, o primogênito de Judá, era mau aos olhos do Senhor, e por isso o Senhor tirou-lhe a vida.", "NTLH": "Porém Er, o filho mais velho, era mau e não agradava a Deus, o SENHOR. Por isso o SENHOR o matou.", "KJA": "Contudo, Er, o primogênito de Judá, cometia o que era mau aos olhos do SENHOR, e por esse motivo o SENHOR o matou.", "KJ": "And Er, Judah's firstborn, was wicked in the sight of the LORD; and the LORD slew him.", "ESV": "But Er, Judah's firstborn, was wicked in the sight of the LORD, and the LORD put him to death.", "NASB": "But Er, Judah’s firstborn, was evil in the sight of the LORD, so the LORD took his life.", "NIV": "But Er, Judah’s firstborn, was wicked in the LORD’s sight; so the LORD put him to death.", "LXX": "ἐγένετο δὲ Ηρ πρωτότοκος Ιουδα πονηρὸς ἔναντι κυρίου, καὶ ἀπέκτεινεν αὐτὸν ὁ θεός.", "Vulgata": "fuit quoque Her primogenitus Iuda nequam in conspectu Domini et ab eo percussus est."}}, {"numero": 8, "texto_hebraico": "וַיֹּ֤אמֶר יְהוּדָה֙ לְאוֹנָ֔ן בֹּ֛א אֶל־אֵ֥שֶׁת אָחִ֖יךָ וְיַבֵּ֣ם אֹתָ֑הּ וְהָקֵ֥ם זֶ֖רַע לְאָחִֽיךָ׃", "palavras": [{"hebraico": "וַיֹּאמֶר", "transliteracao": "wayyōʾmer", "morfossintaxe": "Conjunção (Waw consec.) + Prefixo 3ª pes. masc. sing. + Verbo Qal Imperfeito.", "raiz_campo": "אמר\n(ʾ-m-r)\nDizer, falar, ordenar.", "exegese": "Gramática: Verbo irregular Pe-Aleph. O Aleph torna-se quiescente (mudo) e a vogal do prefixo é alongada para Holem (o).\nContexto: Diante do juízo divino que fulminou seu primogênito, Judá assume sua posição de patriarca e emite uma ordem imediata ao segundo filho."}, {"hebraico": "יְהוּדָה", "transliteracao": "yəhûdāh", "morfossintaxe": "Substantivo Próprio Masculino Absoluto.", "raiz_campo": "ידה\n(y-d-h)\nJudá.", "exegese": "Sujeito da ação verbal."}, {"hebraico": "לְאוֹנָן", "transliteracao": "ləʾônān", "morfossintaxe": "Preposição Inseparável (para, a) + Substantivo Próprio masculino absoluto.", "raiz_campo": "און\n(ʾ-w-n)\nA Onã.", "exegese": "O destinatário da ordem patriarcal. Como segundo filho, o dever do levirato recaía automaticamente sobre ele."}, {"hebraico": "בֹּא", "transliteracao": "bōʾ", "morfossintaxe": "Verbo Qal Imperativo masculino singular.", "raiz_campo": "בוא\n(b-w-ʾ)\nEntra, vai.", "exegese": "Sintaxe e Teologia: O primeiro dos três verbos no imperativo nesta sentença. Como visto no verso 2, \"entrar\" a uma mulher é o eufemismo reverente para coabitação sexual. Judá ordena categoricamente que Onã consume o casamento com a viúva de seu irmão."}, {"hebraico": "אֶל־", "transliteracao": "ʾel-", "morfossintaxe": "Preposição Direcional ligada por Maqqef.", "raiz_campo": "אל\n(ʾ-l)\nPara, em direção a, a.", "exegese": "Complemento obrigatório do verbo de movimento bōʾ."}, {"hebraico": "אֵשֶׁת", "transliteracao": "ʾēšet", "morfossintaxe": "Substantivo feminino singular construto.", "raiz_campo": "אנש / אשה\n(ʾ-n-š / ʾ-š-h)\nMulher de / Esposa de.", "exegese": "Gramática: A forma construta de ishshah (esposa). Indica a relação de posse legal com a palavra seguinte (irmão). Tamar, mesmo viúva, mantém o status legal de \"esposa do irmão\", protegida pela lei consuetudinária patriarcal."}, {"hebraico": "אָחִיךָ", "transliteracao": "ʾāḥîḵā", "morfossintaxe": "Substantivo masculino singular construto + Sufixo Pronominal 2ª pes. masc. sing. (teu).", "raiz_campo": "אחח\n(ʾ-ḥ-ḥ)\nIrmão (teu).", "exegese": "Refere-se ao falecido Er. A repetição da palavra \"irmão\" neste versículo (ocorre duas vezes) sublinha o dever fraternal e a gravidade da quebra pactual que Onã cometerá a seguir."}, {"hebraico": "וְיַבֵּם", "transliteracao": "wəyabbēm", "morfossintaxe": "Conjunção copulativa (e) + Verbo Piel Imperativo masculino singular.", "raiz_campo": "יבם\n(y-b-m)\nCumprir o dever de cunhado, casar pelo levirato.", "exegese": "Gramática e História (Hapax Institucional): Esta é uma palavra raríssima, um verbo denominativo derivado do substantivo yabam (cunhado). Ocorrendo no grau Piel (intensivo/fazedor de ação), significa literalmente \"cunhadeá-la\" (agir como cunhado para com ela). Esta é a primeira menção bíblica da Lei do Levirato (do latim levir, cunhado), que Deus codificaria mais tarde em Deuteronômio 25:5-10. Consistia no dever do irmão solteiro casar-se com a viúva sem filhos do irmão falecido, para que o nome deste não fosse apagado de Israel."}, {"hebraico": "אֹתָהּ", "transliteracao": "ʾōtāhh", "morfossintaxe": "Partícula (Marcador de Obj. Direto) + Sufixo Pron. 3ª pes. fem. sing. (ela).", "raiz_campo": "את\n(ʾ-t)\nA ela.", "exegese": "Gramática: Novamente o Mappiq no He final (הּ), indicando que o sufixo deve ser pronunciado enfaticamente. Refere-se a Tamar."}, {"hebraico": "וְהָקֵם", "transliteracao": "wəhāqēm", "morfossintaxe": "Conjunção copulativa (e) + Verbo Hifil Imperativo masculino singular.", "raiz_campo": "קום\n(q-w-m)\nLevantar, erguer, suscitar, estabelecer.", "exegese": "Gramática: Verbo oco (Ayin-Waw). No Hifil imperativo, significa \"fazer levantar\" ou \"suscitar\". É o terceiro imperativo de Judá.\nTeologia: A ordem não é apenas para coabitação, mas carrega um propósito pactual e redentivo: \"suscitar\" uma herança. A CFW reconhece a santidade do matrimônio para a propagação de uma \"semente santa\" (Cap. XXIV, II)."}, {"hebraico": "זֶרַע", "transliteracao": "zeraʿ", "morfossintaxe": "Substantivo masculino singular absoluto.", "raiz_campo": "זרע\n(z-r-ʿ)\nSemente, descendência, prole.", "exegese": "Teologia Pactual Profunda: Este é um dos termos mais carregados de Gênesis. Remete diretamente ao Protoevangelho de Gênesis 3:15 (a \"semente\" da mulher que esmagará a serpente) e às promessas feitas a Abraão (Gn 12:7, 15:5). Judá, mesmo alheio à magnitude do plano de Deus, atua sob a Providência ordenando a preservação da \"semente\" da qual Cristo, a Semente suprema (Gl 3:16), haveria de nascer."}, {"hebraico": "לְאָחִיךָ׃", "transliteracao": "ləʾāḥîḵā", "morfossintaxe": "Preposição (para) + Substantivo construto + Sufixo Pronominal 2ª pes. masc. sing. (com Sof Pasuq).", "raiz_campo": "אחח\n(ʾ-ḥ-ḥ)\nPara (o) teu irmão.", "exegese": "Contexto Legal: A semente suscitada não pertenceria legalmente a Onã, mas levaria o nome de Er, herdando a porção da primogenitura. É exatamente esta implicação legal e financeira que despertará a ganância e rebelião de Onã no versículo seguinte."}], "traducoes": {"ARA": "Então, disse Judá a Onã: Toma a mulher de teu irmão, e casa-te com ela, e suscita descendência a teu irmão.", "ACF": "Então disse Judá a Onã: Toma a mulher do teu irmão, e casa-te com ela, e suscita descendência a teu irmão.", "NAA": "Então Judá disse a Onã: — Tome a viúva de seu irmão, cumpra o dever de cunhado e suscite descendência para o seu irmão.", "NVI": "Então Judá disse a Onã: \"Deite-se com a mulher do seu irmão e cumpra o seu dever de cunhado para com ela, a fim de garantir descendência a seu irmão\".", "NTLH": "Então Judá disse a Onã: — Vá e durma com a viúva do seu irmão. Cumpra o seu dever de cunhado e dê filhos a ela para que a descendência do seu irmão não se acabe.", "KJA": "Diante disso, orientou Judá a Onã: \"Toma a mulher de teu irmão, cumpre para com ela teus deveres de cunhado e assegura uma descendência para teu irmão!\"", "KJ": "And Judah said unto Onan, Go in unto thy brother's wife, and marry her, and raise up seed to thy brother.", "ESV": "Then Judah said to Onan, \"Go in to your brother's wife and perform the duty of a brother-in-law to her, and raise up offspring for your brother.\"", "NASB": "Then Judah said to Onan, \"Go in to your brother’s wife, and perform your duty as a brother-in-law to her, and raise up offspring for your brother.\"", "NIV": "Then Judah said to Onan, \"Sleep with your brother’s wife and fulfill your duty to her as a brother-in-law to raise up offspring for your brother.\"", "LXX": "εἶπεν δὲ Ιουδας τῷ Αυναν Εἴσελθε πρὸς τὴν γυναῖκα τοῦ ἀδελφοῦ σου καὶ ἐπιγάμβρευσαι αὐτὴν καὶ ἀνάστησον σπέρμα τῷ ἀδελφῷ σου.", "Vulgata": "dixit ergo Iudas Onan introi ad uxorem fratris tui et sociare illi ut suscites semen fratri tuo."}}, {"numero": 9, "texto_hebraico": "וַיֵּ֣דַע אוֹנָ֔ן כִּ֛י לֹּ֥א ל֖וֹ יִהְיֶ֣ה הַזָּ֑רַע וְהָיָ֞ה אִם־בָּ֨א אֶל־אֵ֤שֶׁת אָחִיו֙ וְשִׁחֵ֣ת אַ֔רְצָה לְבִלְתִּ֥י נְתָן־זֶ֖רַע לְאָחִֽיו׃", "palavras": [{"hebraico": "וַיֵּדַע", "transliteracao": "wayyēdaʿ", "morfossintaxe": "Conjunção (Waw consecutivo) + Pref. 3ª pes. masc. sing. + Verbo Qal Imperfeito (apocopado).", "raiz_campo": "ידע\n(y-d-ʿ)\nSaber, conhecer, perceber.", "exegese": "Gramática: Verbo irregular (Pe-Yod). O Yod original da raiz assimila-se/desaparece na conjugação imperfeita.\nTeologia Reformada (Conhecimento e Culpa): A Confissão de Fé de Westminster (Cap. VI) ensina que o pecado se agrava quando cometido contra a luz do conhecimento. Onã \"sabia\" perfeitamente as regras do Levirato. Seu ato não foi acidental ou ignorante; foi uma rebelião intelectualmente consciente contra a ordem de seu pai e as instituições divinas."}, {"hebraico": "אוֹנָן", "transliteracao": "ʾônān", "morfossintaxe": "Substantivo Próprio masculino absoluto.", "raiz_campo": "און\n(ʾ-w-n)\nOnã.", "exegese": "Sujeito da oração. Ele é o agente ativo do pecado narrado."}, {"hebraico": "כִּי", "transliteracao": "kî", "morfossintaxe": "Conjunção subordinativa.", "raiz_campo": "כי\nQue, porque, pois.", "exegese": "Introduz a cláusula que explica *o que* Onã sabia."}, {"hebraico": "לֹּא", "transliteracao": "lֹּא", "morfossintaxe": "Partícula de Negação.", "raiz_campo": "לא\nNão.", "exegese": "Nega a posse do resultado (o filho não seria dele)."}, {"hebraico": "לוֹ", "transliteracao": "lô", "morfossintaxe": "Preposição Lamed (para, a) + Sufixo Pron. 3ª pes. masc. sing. (ele).", "raiz_campo": "ל\n(l)\nPara ele / Dele.", "exegese": "A Motivação Egoísta: O núcleo do pecado de Onã repousa neste pequeno pronome: \"para ele\". A lei do Levirato determinava que o primogênito gerado herdaria o nome e a porção dupla da herança (pertencentes a Er). Se Onã não gerasse filhos para o irmão, ele mesmo se tornaria o único herdeiro legal de Judá. Sua motivação foi ganância financeira e falta de amor fraternal."}, {"hebraico": "יִהְיֶה", "transliteracao": "yihyeh", "morfossintaxe": "Pref. 3ª pes. masc. sing. + Verbo Qal Imperfeito.", "raiz_campo": "היה\n(h-y-h)\nSer, existir, pertencer a (com a prep. Lamed).", "exegese": "A estrutura \"não para ele seria\" é o modo hebraico de expressar posse futura: \"não lhe pertenceria\"."}, {"hebraico": "הַזָּרַע", "transliteracao": "hazzāraʿ", "morfossintaxe": "Artigo Definido (o/a) + Substantivo masc. singular absoluto.", "raiz_campo": "זרע\n(z-r-ʿ)\nA semente, a descendência.", "exegese": "A Semente Pactual: A palavra *zera'* ecoa as promessas abraâmicas. Onã recusa-se categoricamente a ser o canal para a manutenção da semente pactual."}, {"hebraico": "וְהָיָה", "transliteracao": "wəhāyāh", "morfossintaxe": "Conjunção (Waw) + Verbo Qal Perfeito 3ª pes. masc. sing.", "raiz_campo": "היה\n(h-y-h)\nE acontecia, e era.", "exegese": "Sintaxe Temporal (Ação Iterativa): A combinação de *wəhāyāh* com a conjunção *im* (quando/se) estabelece uma ação contínua ou iterativa no passado. Não foi um evento isolado, mas uma prática constante (\"toda vez que ele entrava...\")."}, {"hebraico": "אִם־בָּא", "transliteracao": "ʾim-bāʾ", "morfossintaxe": "Conjunção (quando/se) + Verbo Qal Perfeito 3ª pes. masc. sing.", "raiz_campo": "בוא\n(b-w-ʾ)\nQuando entrava (coabitava).", "exegese": "Onã queria os benefícios do casamento (intimidade física), mas rejeitava veementemente a responsabilidade pactual a ele atrelada."}, {"hebraico": "אֶל־אֵשֶׁת אָחִיו", "transliteracao": "ʾel-ʾēšet ʾāḥîw", "morfossintaxe": "Prep. Direcional + Cadeia de Construto Substantival + Sufixo Pron. 3ms.", "raiz_campo": "אל + איש + אחח\nPara a mulher de seu irmão.", "exegese": "Reafirma a relação legal. Ele coabitava com ela sabendo do seu status e do seu dever."}, {"hebraico": "וְשִׁחֵת", "transliteracao": "wəšiḥēt", "morfossintaxe": "Conjunção (Waw consecutivo) + Verbo Piel Perfeito 3ª pes. masc. sing.", "raiz_campo": "שחת\n(š-ḥ-t)\nArruinar, destruir, desperdiçar, corromper.", "exegese": "Exegese Profunda (Grau Piel): O uso do grau *Piel* indica uma ação intensa e deliberada. Ele não apenas \"derramava\" acidentalmente; ele *destruía ativamente* a semente. O peso teológico é colossal: esta mesma raiz (*shachat*) é usada em Gênesis 6:11-12 para descrever como o mundo estava \"corrompido/arruinado\" diante de Deus, atraindo o dilúvio. O ato de Onã foi uma violenta corrupção do desígnio matrimonial."}, {"hebraico": "אַרְצָה", "transliteracao": "ʾarṣāh", "morfossintaxe": "Substantivo feminino singular + Sufixo Locativo (He-Direcional).", "raiz_campo": "ארץ\n(ʾ-r-ṣ)\nNa terra / Para o chão.", "exegese": "Gramática: A terminação He átona atua como um marcador de direção/localização (\"para a terra\"). Daí a origem da expressão clínica para a ação descrita (*coitus interruptus*)."}, {"hebraico": "לְבִלְתִּי", "transliteracao": "ləbiltî", "morfossintaxe": "Preposição + Partícula Negativa para Infinitivos.", "raiz_campo": "בלת\n(b-l-t)\nA fim de não / Para não.", "exegese": "Revela o intento obstinado da vontade. Seu propósito primário era *evitar* que a promessa se cumprisse no nome do irmão."}, {"hebraico": "נְתָן־זֶרַע", "transliteracao": "nətān-zeraʿ", "morfossintaxe": "Verbo Qal Infinitivo Construto + Substantivo masculino singular absoluto.", "raiz_campo": "נתן + זרע\n(n-t-n + z-r-ʿ)\nDar descendência / semente.", "exegese": "Gramática: *Natan* (dar) é um verbo Pe-Nun. O infinitivo construto está em cadeia fonética (Maqqef) com \"semente\". A violação não era apenas sexual, era uma fraude intencional contra a linhagem da aliança."}, {"hebraico": "לְאָחִיו׃", "transliteracao": "ləʾāḥîw", "morfossintaxe": "Preposição Lamed (para/a) + Subst. construto + Suf. Pron. 3ms (com Sof Pasuq).", "raiz_campo": "אחח\n(ʾ-ḥ-ḥ)\nAo seu irmão.", "exegese": "Encerra o verso confirmando que o pecado central foi contra a lei fraternal/pactual de preservação do nome, movido pela depravação humana e apego terreno (herança)."}], "traducoes": {"ARA": "Sabia, porém, Onã que a descendência não havia de ser para ele; e, todas as vezes que possuía a mulher de seu irmão, deixava o sêmen cair na terra, para não dar descendência a seu irmão.", "ACF": "Onã, porém, soube que esta descendência não havia de ser para ele; e aconteceu que, quando possuía a mulher de seu irmão, derramava o sêmen na terra, para não dar descendência a seu irmão.", "NAA": "Sabia, porém, Onã que a descendência não havia de ser para ele; e, todas as vezes que possuía a viúva de seu irmão, deixava o sêmen cair na terra, para não dar descendência a seu irmão.", "NVI": "Mas Onã sabia que a descendência não seria sua; assim, toda vez que possuía a mulher do seu irmão, derramava o sêmen no chão para não dar descendência a seu irmão.", "NTLH": "Mas Onã sabia que a criança não seria considerada dele. Por isso, cada vez que tinha relações com a viúva do seu irmão, ele derramava o sêmen no chão para que o seu irmão não tivesse descendentes.", "KJA": "No entanto, sabendo Onã que aquela posteridade não seria jamais considerada sua; sempre que a possuía, deixava o sêmen derramar na terra, a fim de não dar descendência a seu irmão.", "KJ": "And Onan knew that the seed should not be his; and it came to pass, when he went in unto his brother's wife, that he spilled it on the ground, lest that he should give seed to his brother.", "ESV": "But Onan knew that the offspring would not be his. So whenever he went in to his brother's wife he would waste the semen on the ground, so as not to give offspring to his brother.", "NASB": "Onan knew that the offspring would not be his; so when he went in to his brother’s wife, he wasted his seed on the ground in order not to give offspring to his brother.", "NIV": "But Onan knew that the child would not be his; so whenever he slept with his brother’s wife, he spilled his semen on the ground to keep from providing offspring for his brother.", "LXX": "γνοὺς δὲ Αυναν ὅτι οὐκ αὐτῷ ἔσται τὸ σπέρμα, ἐγίνετο ὅταν εἰσῄει πρὸς τὴν γυναῖκα τοῦ ἀδελφοῦ αὐτοῦ, ἐξέχεεν ἐπὶ τὴν γῆν τοῦ μὴ δοῦναι σπέρμα τῷ ἀδελφῷ αὐτοῦ.", "Vulgata": "sciens autem Onan quod non sibi nasceretur filius introiens ad uxorem fratris sui semen fundebat in terram ne liberi fratris nomine nascerentur."}}, {"numero": 10, "texto_hebraico": "וַיֵּ֛רַע בְּעֵינֵ֥י יְהוָ֖ה אֲשֶׁ֣ר עָשָׂ֑ה וַיָּ֖מֶת גַּם־אֹתֽוֹ׃", "palavras": [{"hebraico": "וַיֵּרַע", "transliteracao": "wayyēraʿ", "morfossintaxe": "Conjunção (Waw consecutivo) + Prefixo 3ª pes. masc. sing. + Verbo Qal Imperfeito (apocopado).", "raiz_campo": "רעע\n(r-ʿ-ʿ)\nSer mau, ser desagradável, ser perverso.", "exegese": "Gramática: Verbo Geminado (Double-Ayin). A repetição da consoante Ayin da raiz é contraída. Na forma do Waw consecutivo imperfeito, a palavra é apocopada (encurtada), tornando-se wayyēraʿ (\"e foi mau / e pareceu mau\").\nParalelismo: O texto espelha deliberadamente a avaliação feita sobre Er no verso 7. O pecado toma formas diferentes (Er por razões não especificadas, Onã por egoísmo explícito), mas o peso diante do padrão de santidade divina é rigorosamente o mesmo: a depravação."}, {"hebraico": "בְּעֵינֵי", "transliteracao": "bəʿênê", "morfossintaxe": "Preposição Inseparável (em/aos) + Substantivo Dual Construto.", "raiz_campo": "עין\n(ʿ-y-n)\nAos olhos de / Na visão de.", "exegese": "Teologia Reformada (A Onisciência Divina): O antropomorfismo \"aos olhos de\" reforça que, embora o ato de Onã ocorresse na intimidade conjugal (oculto aos homens), nada escapa à presciência e ao juízo perscrutador de Deus. \"E não há criatura alguma encoberta aos seus olhos\" (Hb 4:13)."}, {"hebraico": "יְהוָה", "transliteracao": "Yahweh / Adonai", "morfossintaxe": "Substantivo Próprio Masculino Absoluto.", "raiz_campo": "הוה / היה\n(h-w-h / h-y-h)\nYHWH / O SENHOR.", "exegese": "O Juiz da Aliança novamente emite Seu veredito. A persistência em usar o nome pactual reafirma que a infração foi contra a instituição divina do casamento e da propagação da Semente Prometida."}, {"hebraico": "אֲשֶׁר", "transliteracao": "ʾăšer", "morfossintaxe": "Pronome Relativo.", "raiz_campo": "אשר\nO que, qual, cujo, que.", "exegese": "Introduz a oração subordinada que especifica exatamente o que atraiu a ira divina: a ação deliberada descrita no verso anterior."}, {"hebraico": "עָשָׂה", "transliteracao": "ʿāśāh", "morfossintaxe": "Verbo Qal Perfeito 3ª pes. masc. sing.", "raiz_campo": "עשה\n(ʿ-ś-h)\nFazer, realizar, produzir.", "exegese": "Sintaxe: O verbo está no perfeito, indicando uma ação já consumada. O juízo de Deus recai sobre as *obras* dos homens. CFW Cap. XVI, Seção V: \"as melhores obras dos homens não podem merecer perdão...\", quanto mais uma obra deliberadamente perversa."}, {"hebraico": "וַיָּמֶת", "transliteracao": "wayyāmet", "morfossintaxe": "Conjunção (Waw consecutivo) + Prefixo 3ª pes. masc. sing. + Verbo Hifil Imperfeito (apocopado).", "raiz_campo": "מות\n(m-w-t)\nMatar, fazer morrer, executar.", "exegese": "Gramática Avançada: É o mesmo verbo Hifil (causativo ativo) aplicado a Er no verso 7. A forma normal do Hifil imperfeito de mut seria yāmît. A conjunção Waw consecutivo, no entanto, apocopa a palavra, retraindo o acento e alterando a vogal para Segol, resultando em wayyāmet.\nTeologia Pactual (Juízo Retributivo): O Senhor não é um observador passivo da destruição de Seus planos. A ofensa direta à preservação da Semente Messiânica exigiu a pena capital. É um ato da Justiça Divina em defesa do Seu próprio Decreto e Aliança."}, {"hebraico": "גַּם־", "transliteracao": "gam-", "morfossintaxe": "Partícula Adverbial / Conjunção ligada por Maqqef.", "raiz_campo": "גם\n(g-m)\nTambém, igualmente, até mesmo.", "exegese": "Contexto: Uma palavra curtíssima, mas que atesta de forma devastadora a reincidência da falência moral na linhagem de Judá. Em vez do primogênito e do secundogênito gerarem as tribos líderes, ambos foram varridos pelo juízo antes de deixarem qualquer semente."}, {"hebraico": "אֹתוֹ׃", "transliteracao": "ʾōtô", "morfossintaxe": "Partícula (Marcador de Objeto Direto) + Sufixo Pronominal 3ª pes. masc. sing. (ele). Acompanhado de Sof Pasuq.", "raiz_campo": "את\n(ʾ-t)\nA ele / O.", "exegese": "O alvo da execução. Encerra o versículo com a sentença capital concretizada."}], "traducoes": {"ARA": "O que ele fazia, porém, reprovou o SENHOR, pelo que também o matou.", "ACF": "E o que fazia era mau aos olhos do SENHOR, pelo que também o matou.", "NAA": "O que ele fazia era mau aos olhos do SENHOR, e por isso o SENHOR também o matou.", "NVI": "O Senhor reprovou o que ele fazia e por isso tirou-lhe a vida também.", "NTLH": "Deus, o SENHOR, não gostou do que Onã fazia e por isso o matou também.", "KJA": "Mas o SENHOR reprovou o que Onã fazia e, por isso, tirou-lhe a vida também.", "KJ": "And the thing which he did displeased the LORD: wherefore he slew him also.", "ESV": "And what he did was wicked in the sight of the LORD, and he put him to death also.", "NASB": "It was displeasing in the sight of the LORD what he did; so He took his life also.", "NIV": "What he did was wicked in the LORD's sight; so the LORD put him to death also.", "LXX": "πονηρὸν δὲ ἐφάνη ἐναντίον τοῦ θεοῦ ὅτι ἐποίησεν τοῦτο· καὶ ἐθανάτωσεν καὶ τοῦτον.", "Vulgata": "percussit et eum Dominus eo quod rem detestabilem faceret."}}, {"numero": 11, "texto_hebraico": "וַיֹּ֣אמֶר יְהוּדָה֩ לְתָמָ֨ר כַּלָּת֜וֹ שְׁבִ֧י אַלְמָנָ֣ה בֵית־אָבִ֗יךְ עַד־יִגְדַּל֙ שֵׁלָ֣ה בְנִ֔י כִּ֣י אָמַ֔ר פֶּן־יָמ֥וּת גַּם־ה֖וּא כְּאֶחָ֑יו וַתֵּ֣לֶךְ תָּמָ֔ר וַתֵּ֖שֶׁב בֵּ֥ית אָבִֽיהָ׃", "palavras": [], "traducoes": {}}, {"numero": 12, "texto_hebraico": "וַיִּרְבּוּ֙ הַיָּמִ֔ים וַתָּ֖מָת בַּת־שׁ֣וּעַ אֵֽשֶׁת־יְהוּדָ֑ה וַיִּנָּ֣חֶם יְהוּדָ֗ה וַיַּ֜עַל עַל־גֹּֽזֲזֵ֤י צֹאנוֹ֙ ה֗וּא וְחִירָ֛ה רֵעֵ֥הוּ הָעֲדֻלָּמִ֖י תִּמְנָֽתָה׃", "palavras": [], "traducoes": {}}, {"numero": 13, "texto_hebraico": "וַיֻּגַּ֥ד לְתָמָ֖ר לֵאמֹ֑ר הִנֵּ֥ה חָמִ֛יךְ עֹלֶ֥ה תִמְנָ֖תָה לָגֹ֥ז צֹאנֽוֹ׃", "palavras": [], "traducoes": {}}, {"numero": 14, "texto_hebraico": "וַתָּסַר֩ בִּגְדֵ֨י אַלְמְנוּתָ֜הּ מֵֽעָלֶ֗יהָ וַתְּכַ֤ס בַּצָּעִיף֙ וַתִּתְעַלָּ֔ף וַתֵּ֙שֶׁב֙ בְּפֶ֣תַח עֵינַ֔יִם אֲשֶׁ֖ר עַל־דֶּ֣רֶךְ תִּמְנָ֑תָה כִּ֤י רָאֲתָה֙ כִּֽי־גָדַ֣ל שֵׁלָ֔ה וְהִ֕וא לֹֽא־נִתְּנָ֥ה ל֖וֹ לְאִשָּֽׁה׃", "palavras": [], "traducoes": {}}, {"numero": 15, "texto_hebraico": "וַיִּרְאֶ֣הָ יְהוּדָ֔ה וַֽיַּחְשְׁבֶ֖הָ לְזוֹנָ֑ה כִּ֥י כִסְּתָ֖ה פָּנֶֽיהָ׃", "palavras": [], "traducoes": {}}, {"numero": 16, "texto_hebraico": "וַיֵּ֨ט אֵלֶ֜יהָ אֶל־הַדֶּ֗רֶךְ וַיֹּ֙אמֶר֙ הָֽבָה־נָּא֙ אָב֣וֹא אֵלַ֔יִךְ כִּ֚י לֹ֣א יָדַ֔ע כִּ֥י כַלָּת֖וֹ הִ֑וא וַתֹּ֙אמֶר֙ מַה־תִּתֶּן־לִּ֔י כִּ֥י תָב֖וֹא אֵלָֽי׃", "palavras": [], "traducoes": {}}, {"numero": 17, "texto_hebraico": "וַיֹּ֕אמֶר אָנֹכִ֛י אֲשַׁלַּ֥ח גְּדִֽי־עִזִּ֖ים מִן־הַצֹּ֑אן וַתֹּ֕אמֶר אִם־תִּתֵּ֥ן עֵרָב֖וֹן עַ֥ד שָׁלְחֶֽךָ׃", "palavras": [], "traducoes": {}}, {"numero": 18, "texto_hebr vras": [], "traducoes": {}}, {"numero": 28, "texto_hebraico": "וַיְהִ֥י בְלִדְתָּ֖הּ וַיִּתֶּן־יָ֑ד וַתִּקַּ֣ח הַמְיַלֶּ֗דֶת וַתִּקְשֹׁ֨ר עַל־יָד֤וֹ שָׁנִי֙ לֵאמֹ֔ר זֶ֖ה יָצָ֥א רִאשֹׁנָֽה׃", "palavras": [], "traducoes": {}}, {"numero": 29, "texto_hebraico": "וַיְהִ֣י ׀ כְּמֵשִׁ֣יב יָד֗וֹ וְהִנֵּה֙ יָצָ֣א אָחִ֔יו וַתֹּ֕אמֶר מַה־פָּרַ֖צְתָּ עָלֶ֣יךָ פָּ֑רֶץ וַיִּקְרָ֥א שְׁמ֖וֹ פָּֽרֶץ׃", "palavras": [], "traducoes": {}}, {"numero": 30, "texto_hebraico": "וְאַחַר֙ יָצָ֣א אָחִ֔יו אֲשֶׁ֥ר עַל־יָד֖וֹ הַשָּׁנִ֑י וַיִּקְרָ֥א שְׁמ֖וֹ זָֽרַח׃ ס", "palavras": [], "traducoes": {}}]};

let currentVerse = 1;

function init() {
  const list = document.getElementById('verse-list');
  DATA.versiculos.forEach(v => {
    const btn = document.createElement('button');
    btn.className = 'verse-btn' + (v.palavras.length > 0 ? ' has-analysis' : '');
    btn.id = 'vbtn-' + v.numero;
    btn.innerHTML = `<span class="verse-num">${v.numero}</span><span class="verse-preview">${v.texto_hebraico.substring(0,30)}</span>`;
    btn.onclick = () => showVerse(v.numero);
    list.appendChild(btn);
  });
  showVerse(1);
}

function filterVerses(q) {
  document.querySelectorAll('.verse-btn').forEach(btn => {
    const num = btn.querySelector('.verse-num').textContent;
    btn.style.display = !q || num.includes(q) ? '' : 'none';
  });
}

function showVerse(num) {
  currentVerse = num;
  const v = DATA.versiculos.find(x => x.numero === num);
  if (!v) return;

  document.querySelectorAll('.verse-btn').forEach(b => b.classList.remove('active'));
  const activeBtn = document.getElementById('vbtn-' + num);
  if (activeBtn) { activeBtn.classList.add('active'); activeBtn.scrollIntoView({block:'nearest'}); }

  const hasAnalysis = v.palavras.length > 0;
  const hasTrans = Object.keys(v.traducoes).length > 0;

  const main = document.getElementById('main-content');
  main.innerHTML = `
    <div class="verse-card">
      <div class="verse-header">
        <div class="vnum">${v.numero}</div>
        <div><div class="vlabel">Gênesis 38:${v.numero}</div></div>
      </div>
      <div class="hebrew-text">${v.texto_hebraico || '— texto hebraico —'}</div>

      <div class="tabs">
        ${hasAnalysis ? '<button class="tab active" onclick="switchTab('analysis',this)">⬡ Análise das Palavras</button>' : ''}
        ${hasTrans ? '<button class="tab' + (hasAnalysis?'':' active') + '" onclick="switchTab('trans',this)">📖 Traduções Comparadas</button>' : ''}
      </div>

      ${hasAnalysis ? `<div class="tab-content active" id="tab-analysis">${renderAnalysis(v.palavras)}</div>` : ''}
      ${hasTrans ? `<div class="tab-content${hasAnalysis?'':' active'}" id="tab-trans">${renderTranslations(v.traducoes)}</div>` : ''}
      ${!hasAnalysis && !hasTrans ? `<div class="no-analysis"><div class="icon">📜</div><p>Análise detalhada em elaboração para este versículo.</p></div>` : ''}

      <div class="nav-bar">
        <button class="nav-btn" onclick="showVerse(${num-1})" ${num<=1?'disabled':''}>← ${num>1?num-1:''}</button>
        <span class="verse-counter">${num} / ${DATA.versiculos.length}</span>
        <button class="nav-btn" onclick="showVerse(${num+1})" ${num>=DATA.versiculos.length?'disabled':''}>${num<DATA.versiculos.length?num+1:''} →</button>
      </div>
    </div>`;
}

function renderAnalysis(palavras) {
  if (!palavras.length) return '<p style="color:var(--text2)">Sem dados de análise.</p>';
  return '<div class="words-grid">' + palavras.map((p,i) => `
    <div class="word-card" id="wc-${i}">
      <div class="word-header" onclick="toggleWord('wc-${i}')">
        <span class="word-heb">${p.hebraico}</span>
        <div>
          <div class="word-translit">${p.transliteracao ? '(' + p.transliteracao + ')' : ''}</div>
          <div class="word-sem">${p.raiz_campo.split('\n')[0].substring(0,60)}</div>
        </div>
        <span class="word-expand-icon">▼</span>
      </div>
      <div class="word-body">
        ${p.morfossintaxe ? `<div class="word-detail"><div><div class="detail-label">⚙ Morfossintaxe</div><div class="detail-val">${p.morfossintaxe.replace(/\n/g,'<br>')}</div></div>
        <div><div class="detail-label badge-wrap"><span class="badge">Raiz</span><br><div class="detail-val">${p.raiz_campo.replace(/\n/g,'<br>')}</div></div></div></div>` : ''}
        ${p.exegese ? `<div class="word-detail exeg-full"><div class="detail-label">✦ Exegese · Teologia · Gramática</div><div class="detail-val">${p.exegese.replace(/\n/g,'<br>')}</div></div>` : ''}
      </div>
    </div>`).join('') + '</div>';
}

function renderTranslations(trs) {
  const keys = Object.keys(trs);
  if (!keys.length) return '<p style="color:var(--text2)">Sem traduções.</p>';
  return '<div class="trans-grid">' + keys.map(k => `
    <div class="trans-card">
      <div class="trans-version">${k}</div>
      <div class="trans-text">${trs[k]}</div>
    </div>`).join('') + '</div>';
}

function toggleWord(id) {
  const card = document.getElementById(id);
  card.classList.toggle('open');
}

function switchTab(tabId, btn) {
  const card = btn.closest('.verse-card');
  card.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  card.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  const tc = card.querySelector('#tab-' + tabId);
  if (tc) tc.classList.add('active');
}

function toggleTheme() {
  document.body.classList.toggle('light');
  const btn = document.querySelector('.theme-btn');
  btn.textContent = document.body.classList.contains('light') ? '🌙 Modo Escuro' : '☀ Modo Claro';
}

init();
</script>
